<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>도서관 · 북로그</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    :root{
      --bg:#f2ece0;--card:#faf6ef;--border:#ddd0b8;--border2:#cfc3ac;
      --tx1:#2e1f0e;--tx2:#5c3d1e;--tx3:#a08c72;
      --acc:#b07030;--acc2:#7a3e18;
      --ff:'Pretendard','Apple SD Gothic Neo',sans-serif;
      --fs:'DM Serif Display',serif;
      --rs:4px;--r:7px;
    }
    html{min-height:100%;background:var(--bg);}
    body{
      min-height:100vh;display:flex;flex-direction:column;
      font-family:var(--ff);color:var(--tx1);
      background:linear-gradient(160deg,#fdf8f0 0%,#ede2cc 100%);
    }

    /* ── 헤더 ── */
    .hd{
      background:rgba(250,246,239,.96);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--border);
      padding:.48rem .9rem;
      display:flex;align-items:center;justify-content:space-between;gap:.5rem;
      position:sticky;top:0;z-index:10;flex-shrink:0;
    }
    .hd-left{display:flex;align-items:center;gap:.45rem;}
    .hd-logo{font-family:var(--fs);font-size:.95rem;color:var(--tx1);white-space:nowrap;}
    .hd-sep{color:var(--border2);font-size:.8rem;}
    .hd-title{font-size:.7rem;color:var(--tx2);font-weight:600;white-space:nowrap;}
    .hd-chip{
      background:var(--acc);color:#fff;
      font-size:.58rem;font-weight:600;
      padding:.1rem .42rem;border-radius:20px;white-space:nowrap;
    }
    .hd-right{display:flex;align-items:center;gap:.5rem;flex-shrink:0;}
    .hd-time{text-align:right;}
    .hd-clock{font-size:.66rem;font-weight:600;color:var(--tx2);font-variant-numeric:tabular-nums;letter-spacing:.04em;}
    .hd-elapsed-row{display:flex;align-items:center;gap:.2rem;justify-content:flex-end;}
    .hd-elapsed-lbl{font-size:.55rem;color:var(--tx3);}
    .hd-elapsed{font-size:.66rem;font-weight:700;color:var(--acc);font-variant-numeric:tabular-nums;}
    .btn-leave{
      font-size:.67rem;padding:.26rem .62rem;
      background:none;color:var(--tx2);
      border:1px solid var(--border2);border-radius:var(--rs);
      cursor:pointer;font-family:var(--ff);white-space:nowrap;
      transition:background .15s,color .15s;
    }
    .btn-leave:hover{background:var(--border);color:var(--tx1);}

    /* ── 메인 ── */
    .main{
      flex:1;display:flex;flex-direction:column;
      align-items:center;padding:1.1rem .8rem 2rem;gap:1rem;
    }

    /* ── 도서관 테이블 ── */
    .lib-table{
      width:min(600px,96vw);
      background:linear-gradient(160deg,#b07232,#7a4c18);
      border-radius:18px;
      padding:1rem .85rem 1.1rem;
      box-shadow:0 7px 30px rgba(90,40,5,.28),0 1px 0 rgba(255,255,255,.12) inset,0 -2px 0 rgba(0,0,0,.12) inset;
    }
    .lib-table-label{
      text-align:center;
      color:rgba(255,255,255,.42);
      font-size:.57rem;font-weight:600;
      letter-spacing:.22em;text-transform:uppercase;
      margin-bottom:.72rem;
    }

    /* ── 격자 ── */
    .lib-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(92px,1fr));
      gap:.55rem;
    }

    /* ── 일반 좌석 ── */
    .seat{
      display:flex;flex-direction:column;align-items:center;gap:.22rem;
      padding:.52rem .4rem .42rem;
      background:var(--card);
      border:1px solid var(--border);border-radius:10px;
      position:relative;cursor:default;
      animation:seatIn .22s ease;
      min-height:80px;
    }
    @keyframes seatIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
    .seat:hover{box-shadow:0 2px 12px rgba(100,50,10,.13);}

    /* ── 이름 ── */
    .name{
      font-size:.59rem;color:var(--tx2);font-weight:600;
      max-width:84px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      text-align:center;
    }

    /* ── 말풍선 (일반) ── */
    .speech{
      position:relative;
      background:#fdf7ee;border:1px solid var(--border);border-radius:8px;
      padding:.18rem .38rem;
      font-size:.55rem;color:var(--tx2);
      max-width:84px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      line-height:1.3;text-align:center;
    }
    .speech::before{
      content:'';position:absolute;
      top:-5px;left:50%;transform:translateX(-50%);
      border-left:4px solid transparent;border-right:4px solid transparent;
      border-bottom:5px solid var(--border);
    }
    .speech::after{
      content:'';position:absolute;
      top:-3.5px;left:50%;transform:translateX(-50%);
      border-left:3.5px solid transparent;border-right:3.5px solid transparent;
      border-bottom:4.5px solid #fdf7ee;
    }
    .speech-tip{
      display:none;position:absolute;
      bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
      background:var(--tx1);color:#fff;
      font-size:.6rem;padding:.28rem .55rem;border-radius:6px;
      white-space:nowrap;z-index:100;
      max-width:160px;white-space:normal;text-align:center;line-height:1.4;
      pointer-events:none;
    }
    .seat:hover .speech-tip{display:block;}

    /* ── 유령 좌석 ── */
    .ghost{
      display:flex;flex-direction:column;align-items:center;gap:.22rem;
      padding:.52rem .4rem .42rem;
      background:linear-gradient(135deg,rgba(255,255,255,.18),rgba(255,255,255,.08));
      border:1.5px dashed rgba(255,255,255,.28);border-radius:10px;
      cursor:default;
      animation:seatIn .22s ease;
      min-height:80px;position:relative;
    }
    .ghost:hover{background:linear-gradient(135deg,rgba(255,255,255,.24),rgba(255,255,255,.12));}
    .ghost-emoji{font-size:1.65rem;line-height:1;filter:opacity(.78);}

    /* ── 생각 말풍선 (유령) ── */
    .thought{
      position:relative;
      background:rgba(255,255,255,.92);
      border:1.5px solid rgba(255,255,255,.5);border-radius:14px;
      padding:.18rem .38rem;
      font-size:.54rem;color:var(--tx2);font-style:italic;
      max-width:84px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      line-height:1.3;text-align:center;
    }
    .thought::before{
      content:'';position:absolute;
      bottom:-6px;left:calc(50% - 3px);
      width:5px;height:5px;
      background:rgba(255,255,255,.92);border:1.5px solid rgba(255,255,255,.5);border-radius:50%;
    }
    .thought::after{
      content:'';position:absolute;
      bottom:-11px;left:calc(50% - 2px);
      width:3.5px;height:3.5px;
      background:rgba(255,255,255,.92);border:1.5px solid rgba(255,255,255,.5);border-radius:50%;
    }

    /* ── 유령 툴팁 ── */
    .ghost-tip{
      display:none;position:absolute;
      top:-34px;left:50%;transform:translateX(-50%);
      background:rgba(46,31,14,.88);color:#fff;
      font-size:.58rem;padding:.24rem .5rem;border-radius:6px;
      white-space:nowrap;z-index:100;pointer-events:none;font-style:normal;
    }
    .ghost:hover .ghost-tip{display:block;}

    /* ── 빈 좌석 ── */
    .slot-empty{
      background:rgba(255,255,255,.09);
      border:1.5px dashed rgba(255,255,255,.2);
      border-radius:10px;min-height:80px;
    }

    /* ── 나 자신 강조 ── */
    .seat.is-me{
      border-color:var(--acc);
      box-shadow:0 0 0 1.5px var(--acc) inset;
    }
    .seat.is-me .name::after{
      content:'나';display:inline-block;
      background:var(--acc);color:#fff;
      font-size:.48rem;padding:.05rem .22rem;border-radius:10px;
      margin-left:.22rem;vertical-align:middle;line-height:1.6;
    }

    /* ── 빈 상태 메시지 ── */
    .empty-msg{
      text-align:center;padding:.8rem 1rem;
      color:rgba(255,255,255,.45);font-size:.66rem;line-height:1.7;
      font-style:italic;
    }

    /* ── 로딩 ── */
    .loading{
      text-align:center;padding:3rem;color:var(--tx3);font-size:.78rem;
    }
    .spinner{
      width:20px;height:20px;
      border:2px solid var(--border);border-top-color:var(--acc);
      border-radius:50%;animation:spin .8s linear infinite;
      margin:0 auto .75rem;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── 상태 메시지 ── */
    .status-msg{
      font-size:.68rem;color:var(--tx3);text-align:center;
      padding:.5rem 1rem;line-height:1.6;
    }

    @media(max-width:380px){
      .lib-grid{grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:.45rem;}
      .seat,.ghost{padding:.42rem .32rem .36rem;min-height:72px;}
      .speech,.thought{max-width:72px;font-size:.52rem;}
    }
  </style>
</head>
<body>

<!-- 헤더 -->
<div class="hd">
  <div class="hd-left">
    <span class="hd-logo">Booklog</span>
    <span class="hd-sep">·</span>
    <span class="hd-title">도서관</span>
    <span class="hd-chip" id="lib-count">0명</span>
  </div>
  <div class="hd-right">
    <div class="hd-time">
      <div class="hd-clock" id="lib-clock">00:00:00</div>
      <div class="hd-elapsed-row">
        <span class="hd-elapsed-lbl">체류</span>
        <span class="hd-elapsed" id="lib-elapsed">0s</span>
      </div>
    </div>
    <button class="btn-leave" onclick="leaveLibrary()">나가기</button>
  </div>
</div>

<!-- 메인 -->
<div class="main" id="lib-main">
  <div class="loading"><div class="spinner"></div>입장 중...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://xowlwzpoxrudgaoavkbr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhvd2x3enBveHJ1ZGdhb2F2a2JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NTgxNjQsImV4cCI6MjA5MjIzNDE2NH0.Dlv8KYcQAieS1jQ9J6zjfsodco2U-m3ObuP5LXJPaVQ';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { persistSession:true, storageKey:'booklog-auth', storage:window.localStorage, autoRefreshToken:true }
});

let params = {}, channel = null, joinedAt = null, clockTick = null, myUserId = null;

/* ── 시계 ── */
function startClock() {
  function tick() {
    const n = new Date();
    const pad = v => String(v).padStart(2,'0');
    const cl = document.getElementById('lib-clock');
    if(cl) cl.textContent = `${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
    const el = document.getElementById('lib-elapsed');
    if(el && joinedAt) {
      const s = Math.floor((Date.now()-joinedAt)/1000);
      const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sc=s%60;
      el.textContent = h>0?`${h}h ${m}m`:m>0?`${m}m ${sc}s`:`${sc}s`;
    }
  }
  tick();
  clockTick = setInterval(tick, 1000);
}

/* ── 아바타 HTML ── */
function makeAv(name, url, size) {
  const initial = (name||'독').slice(0,1).toUpperCase();
  const colors = ['#b07030','#6b8f6b','#5a7a8a','#8b6b8b','#c4714a'];
  const bg = colors[(name||'').charCodeAt(0)%colors.length];
  const fallback = `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${bg};border:2px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;font-size:${Math.round(size*.38)}px;font-weight:600;color:#fff;flex-shrink:0;">${initial}</div>`;
  if(url) return `<img src="${url.replace(/'/g,'%27')}" style="width:${size}px;height:${size}px;border-radius:50%;border:2px solid var(--border);object-fit:cover;flex-shrink:0;" onerror="this.outerHTML='${fallback.replace(/'/g,'&#39;')}'">`;
  return fallback;
}

/* ── HTML 이스케이프 ── */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ── 좌석 카드 HTML ── */
function makeSeat(m) {
  if(m.is_observer) return '';

  const isMe = m.presence_ref && myPresenceRef && m.presence_ref === myPresenceRef;

  if(m.is_ghost) {
    const bookHtml = m.book_title
      ? `<div class="thought" title="${esc(m.book_title)}">📖 ${esc(m.book_title.length>11?m.book_title.slice(0,11)+'…':m.book_title)}</div>`
      : '';
    const meTip = isMe ? '<div class="ghost-tip">나 (유령)</div>' : '<div class="ghost-tip">유령이 함께 읽고 있어요!</div>';
    return `<div class="ghost">${meTip}<div class="ghost-emoji">👻</div>${bookHtml}</div>`;
  }

  const name = m.display_name || '독자';
  const av = makeAv(name, m.avatar_url, 40);
  let speech = '';
  if(m.book_title) {
    const sh = m.book_title.length>11?m.book_title.slice(0,11)+'…':m.book_title;
    speech = `<div class="speech">📖 ${esc(sh)}<div class="speech-tip">${esc(m.book_title)}</div></div>`;
  }
  const meClass = isMe ? ' is-me' : '';
  return `<div class="seat${meClass}">${av}<div class="name">${esc(name)}</div>${speech}</div>`;
}

let myPresenceRef = null;

/* ── 방 렌더링 ── */
function render() {
  if(!channel) return;
  const state = channel.presenceState();
  const allEntries = Object.values(state).flat();
  const members = allEntries.filter(m => !m.is_observer);

  // 내 presence_ref 찾기
  if(myUserId && !myPresenceRef) {
    const myEntry = Object.entries(state).find(([k]) => k === myUserId);
    if(myEntry) {
      const arr = myEntry[1];
      if(arr && arr[0]) myPresenceRef = arr[0].presence_ref;
    }
  }

  const cnt = document.getElementById('lib-count');
  if(cnt) cnt.textContent = `${members.length}명`;

  const main = document.getElementById('lib-main');
  if(!main) return;

  const minSlots = Math.max(members.length + (members.length < 4 ? 4 - members.length : 2), 6);
  const emptySlots = Math.max(0, minSlots - members.length);

  const seatHtml = members.map(makeSeat).join('');
  const emptyHtml = Array.from({length: emptySlots}).map(() => `<div class="slot-empty"></div>`).join('');

  const emptyMsg = members.length === 0
    ? `<div class="empty-msg">아직 아무도 없어요.<br>오늘의 첫 번째 독자가 되어보세요 🕯️</div>`
    : '';

  main.innerHTML = `
    <div class="lib-table">
      <div class="lib-table-label">Reading Table</div>
      <div class="lib-grid">${seatHtml}${emptyHtml}</div>
      ${emptyMsg}
    </div>`;
}

/* ── 나가기 ── */
async function leaveLibrary() {
  saveTime();
  clearInterval(clockTick);
  if(channel) {
    try { await channel.untrack(); } catch(e){}
    try { await channel.unsubscribe(); } catch(e){}
    channel = null;
  }
  try { window.close(); } catch(e){}
  setTimeout(()=>{
    const m = document.getElementById('lib-main');
    if(m) m.innerHTML='<div class="status-msg">독서 시간이 저장됐어요. 👋<br>이 창을 닫아주세요.</div>';
  }, 300);
}

/* ── 시간 저장 (localStorage → 메인 창이 수신) ── */
function saveTime() {
  if(!joinedAt || !params.bookId) return;
  const mins = Math.round((Date.now()-joinedAt)/60000);
  if(mins < 1) return;
  localStorage.setItem('bl_lib_session_done', JSON.stringify({
    bookId: params.bookId,
    minutes: mins,
    date: new Date().toISOString().slice(0,10)
  }));
}

/* ── 초기화 ── */
async function init() {
  startClock();
  try {
    const raw = localStorage.getItem('bl_lib_params');
    if(raw) { params = JSON.parse(raw); localStorage.removeItem('bl_lib_params'); }
  } catch(e) { params={}; }

  let session = null;
  try {
    const { data } = await Promise.race([
      sb.auth.getSession(),
      new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),5000))
    ]);
    session = data?.session;
  } catch(e){}

  if(!session?.user) {
    document.getElementById('lib-main').innerHTML = `<div class="status-msg">🔒 로그인이 필요해요.<br>북로그에서 로그인 후 다시 시도해주세요.</div>`;
    return;
  }

  joinedAt = Date.now();
  myUserId = session.user.id;

  channel = sb.channel('bl_library', { config:{ presence:{ key: myUserId } } });

  const payload = params.isGhost
    ? { is_ghost:true, is_observer:false, book_title:params.bookTitle||null }
    : {
        is_ghost:false, is_observer:false,
        display_name: params.displayName || '독자',
        avatar_url: params.avatarUrl || null,
        book_title: params.bookTitle || null
      };

  channel
    .on('presence', { event:'sync' }, () => render())
    .on('presence', { event:'join' }, () => render())
    .on('presence', { event:'leave' }, () => render())
    .subscribe(async status => {
      if(status === 'SUBSCRIBED') {
        try { await channel.track(payload); } catch(e) { console.warn('track error', e); }
        document.querySelector('.loading')?.remove();
        // 짧은 지연 후 렌더 (presence state 반영 대기)
        setTimeout(() => render(), 400);
      } else if(status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
        document.getElementById('lib-main').innerHTML = `<div class="status-msg">📡 연결에 실패했어요.<br>잠시 후 다시 시도해주세요.</div>`;
      }
    });
}

window.addEventListener('beforeunload', () => saveTime());
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
