<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오프라인 — 북로그</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fdf8f0;
      color: #3a2a1a;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      text-align: center;
      padding: 24px;
    }
    img { width: 96px; height: 96px; margin-bottom: 24px; }
    h1 { font-size: 20px; margin: 0 0 8px; }
    p { font-size: 15px; color: #6a5a48; margin: 0 0 24px; line-height: 1.6; }
    button {
      background: #b07030;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <img src="/icon-192.png" alt="북로그">
  <h1>인터넷에 연결되어 있지 않아요</h1>
  <p>북로그는 인터넷 연결이 필요합니다.<br>연결을 확인한 뒤 다시 시도해 주세요.</p>
  <button onclick="location.reload()">다시 시도</button>
</body>
</html>
