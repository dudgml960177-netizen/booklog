<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=DM+Serif+Display:ital@0;1&family=Lato:wght@300;400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 628px;
    overflow: hidden;
    font-family: 'Noto Serif KR', serif;
    background: #2a1e0e;
  }

  .banner {
    width: 1200px;
    height: 628px;
    background: #2a1e0e;
    display: flex;
    position: relative;
    overflow: hidden;
  }

  /* 좌측 패널 */
  .left {
    width: 520px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 56px;
    position: relative;
    z-index: 2;
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 40px;
    color: #f5ede0;
    margin-bottom: 28px;
  }
  .logo span {
    font-size: 13px;
    font-family: 'Lato', sans-serif;
    font-style: normal;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #9a7a55;
    display: block;
    margin-top: 4px;
  }

  .main-copy {
    font-size: 34px;
    font-weight: 700;
    color: #f5ede0;
    line-height: 1.35;
    letter-spacing: -.5px;
    margin-bottom: 20px;
  }
  .main-copy em {
    color: #c4714a;
    font-style: normal;
  }

  .sub-copy {
    font-size: 15px;
    color: #a08860;
    line-height: 1.7;
    margin-bottom: 36px;
  }

  .cta {
    display: inline-block;
    background: #c4714a;
    color: #fff;
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 14px 36px;
    border-radius: 50px;
    width: fit-content;
    box-shadow: 0 6px 20px rgba(196,113,74,.4);
  }

  /* 중앙 구분선 */
  .divider {
    width: 1px;
    background: linear-gradient(180deg, transparent, rgba(245,237,224,.15) 30%, rgba(245,237,224,.15) 70%, transparent);
    position: relative;
    z-index: 2;
  }

  /* 우측 패널 */
  .right {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 48px 52px;
    gap: 16px;
    position: relative;
    z-index: 2;
  }

  /* 미니 카드들 */
  .mini-card {
    background: rgba(245,237,224,.06);
    border: 1px solid rgba(245,237,224,.10);
    border-radius: 14px;
    padding: 20px 22px;
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .mini-card.accent {
    background: rgba(196,113,74,.12);
    border-color: rgba(196,113,74,.3);
  }
  .mini-icon {
    font-size: 28px;
    flex-shrink: 0;
    width: 44px;
    text-align: center;
  }
  .mini-info {}
  .mini-name {
    font-size: 15px;
    font-weight: 700;
    color: #f5ede0;
    margin-bottom: 4px;
  }
  .mini-desc {
    font-size: 12.5px;
    color: #9a7a55;
    line-height: 1.5;
  }
  .mini-stat {
    margin-left: auto;
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 26px;
    color: #c4714a;
    flex-shrink: 0;
  }

  /* 배경 장식 */
  .bg-glow-l {
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(196,113,74,.12) 0%, transparent 65%);
    top: -100px; left: -80px;
  }
  .bg-glow-r {
    position: absolute;
    width: 350px; height: 350px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(100,70,30,.2) 0%, transparent 65%);
    bottom: -80px; right: 100px;
  }

  /* 하단 URL */
  .url-tag {
    position: absolute;
    bottom: 28px;
    left: 56px;
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    color: #5a4020;
    letter-spacing: .5px;
    z-index: 2;
  }

  /* 우측 하단 배지 */
  .free-badge {
    position: absolute;
    bottom: 24px; right: 52px;
    background: rgba(245,237,224,.08);
    border: 1px solid rgba(245,237,224,.15);
    border-radius: 20px;
    padding: 7px 18px;
    font-family: 'Lato', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #9a7a55;
    z-index: 2;
  }
</style>
</head>
<body>
<div class="banner">
  <div class="bg-glow-l"></div>
  <div class="bg-glow-r"></div>

  <!-- 좌측 -->
  <div class="left">
    <div class="logo">
      Bok Log
      <span>Reading Journal App</span>
    </div>

    <div class="main-copy">
      읽는 삶을<br>
      <em>기록으로 남기세요</em>
    </div>

    <div class="sub-copy">
      독서 타이머, 문장 수첩, 통계까지<br>
      내 독서 습관을 한 곳에서 관리해요
    </div>

    <div class="cta">무료로 시작하기</div>
  </div>

  <div class="divider"></div>

  <!-- 우측 -->
  <div class="right">
    <div class="mini-card accent">
      <div class="mini-icon">⏱</div>
      <div class="mini-info">
        <div class="mini-name">독서 타이머</div>
        <div class="mini-desc">오늘 독서 시간을 자동으로 기록</div>
      </div>
      <div class="mini-stat">2h 30m</div>
    </div>

    <div class="mini-card">
      <div class="mini-icon">✍️</div>
      <div class="mini-info">
        <div class="mini-name">문장 수첩</div>
        <div class="mini-desc">마음에 드는 문장을 형광펜으로 저장</div>
      </div>
      <div class="mini-stat">148</div>
    </div>

    <div class="mini-card">
      <div class="mini-icon">📊</div>
      <div class="mini-info">
        <div class="mini-name">독서 통계 & 달력</div>
        <div class="mini-desc">월간 완독 · 연속 독서일 · 별점 분포</div>
      </div>
      <div class="mini-stat">32일</div>
    </div>
  </div>

  <div class="url-tag">boklog-neon.vercel.app</div>
  <div class="free-badge">Free</div>
</div>
</body>
</html>
