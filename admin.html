<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>북로그 관리자</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #f2ece0; --card: #faf6ef; --border: #ddd0b8; --border2: #c8bca4;
      --acc: #b07030; --tx1: #2e1f0e; --tx2: #6b4c2a; --tx3: #a08c72;
      --ff: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    }
    body { margin: 0; background: var(--bg); font-family: var(--ff); color: var(--tx1); min-height: 100vh; }

    /* 로그인 */
    #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    .login-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 2rem 1.8rem; width: 100%; max-width: 320px; box-shadow: 0 4px 24px rgba(70,40,10,.09); }
    .login-card h2 { margin: 0 0 1.3rem; font-size: 1.1rem; color: var(--tx1); }
    .input { width: 100%; padding: .6rem .75rem; border: 1.5px solid var(--border); border-radius: 8px; font-size: .88rem; font-family: var(--ff); background: var(--bg); color: var(--tx1); outline: none; margin-bottom: .55rem; }
    .input:focus { border-color: var(--acc); }
    .btn { width: 100%; padding: .6rem; border: none; border-radius: 8px; background: var(--acc); color: #fff; font-size: .9rem; font-family: var(--ff); font-weight: 600; cursor: pointer; transition: opacity .15s; }
    .btn:hover { opacity: .88; }
    .btn:disabled { opacity: .5; cursor: default; }
    .err { font-size: .72rem; color: #b8001f; margin-bottom: .4rem; }

    /* 관리 화면 */
    #admin-screen { display: none; padding: 1.2rem 1rem 3rem; max-width: 960px; margin: 0 auto; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .admin-header h1 { margin: 0; font-size: 1.1rem; color: var(--tx1); }
    .btn-sm { padding: .3rem .7rem; border: 1px solid var(--border2); border-radius: 6px; background: none; font-size: .72rem; font-family: var(--ff); color: var(--tx3); cursor: pointer; transition: all .13s; }
    .btn-sm:hover { border-color: var(--acc); color: var(--acc); }

    /* 탭 */
    .tab-bar { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 1.2rem; }
    .tab-btn { padding: .55rem 1.1rem; border: none; background: none; font-size: .82rem; font-family: var(--ff); color: var(--tx3); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .13s; }
    .tab-btn.on { color: var(--acc); border-bottom-color: var(--acc); font-weight: 600; }
    .tab-btn:hover:not(.on) { color: var(--tx2); }

    /* 공통 컨트롤 */
    .filter-row { display: flex; gap: .4rem; margin-bottom: .75rem; flex-wrap: wrap; align-items: center; }
    .filter-btn { padding: .28rem .7rem; border: 1.5px solid var(--border); border-radius: 20px; background: none; font-size: .72rem; font-family: var(--ff); color: var(--tx3); cursor: pointer; transition: all .13s; }
    .filter-btn.on { border-color: var(--acc); color: var(--acc); background: #fff8f0; font-weight: 600; }
    .search-bar { display: flex; gap: .4rem; margin-bottom: 1rem; align-items: center; }
    .search-bar input { flex: 1; padding: .42rem .75rem; border: 1.5px solid var(--border); border-radius: 20px; font-size: .8rem; font-family: var(--ff); background: var(--card); color: var(--tx1); outline: none; }
    .search-bar input:focus { border-color: var(--acc); }
    .search-bar button { padding: .4rem .9rem; border: none; border-radius: 20px; background: var(--acc); color: #fff; font-size: .75rem; font-family: var(--ff); font-weight: 600; cursor: pointer; white-space: nowrap; }
    .search-clear { padding: .4rem .7rem; border: 1px solid var(--border2); border-radius: 20px; background: none; font-size: .75rem; font-family: var(--ff); color: var(--tx3); cursor: pointer; }
    .stats-row { display: flex; gap: .6rem; margin-bottom: 1.1rem; flex-wrap: wrap; }
    .stat-chip { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: .45rem .8rem; font-size: .72rem; color: var(--tx2); }
    .stat-chip b { font-size: .88rem; color: var(--tx1); display: block; }
    .search-hint { font-size: .72rem; color: var(--acc); margin-left: .3rem; }

    /* 테이블 */
    table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 10px; overflow: hidden; }
    th { padding: .5rem .7rem; font-size: .67rem; letter-spacing: .04em; text-transform: uppercase; color: var(--tx3); font-weight: 600; background: var(--bg); text-align: left; border-bottom: 1px solid var(--border); }
    td { padding: .55rem .7rem; font-size: .78rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fffaf5; }
    .badge { display: inline-block; padding: .12rem .45rem; border-radius: 4px; font-size: .65rem; font-weight: 600; letter-spacing: .03em; }
    .badge-pending { background: #fff3cd; color: #856404; }
    .badge-confirmed { background: #d1e7dd; color: #0a5d2a; }
    .badge-cancelled { background: #f8d7da; color: #842029; }
    .badge-admin { background: #b07030; color: #fff; }
    .badge-user { background: #e8dcc8; color: #6b4c2a; }
    .badge-ok { background: #d1e7dd; color: #0a5d2a; }
    .badge-no { background: #f8d7da; color: #842029; }
    .code-cell { font-family: monospace; font-weight: 700; letter-spacing: .08em; color: var(--acc); }
    .plan-name { font-size: .72rem; color: var(--tx2); }
    .amt { font-weight: 700; color: var(--tx1); }
    .empty { text-align: center; padding: 2.5rem; font-size: .82rem; color: var(--tx3); }
    .loading { text-align: center; padding: 2rem; font-size: .82rem; color: var(--tx3); }

    /* 버튼류 */
    .btn-confirm { padding: .3rem .65rem; border: none; border-radius: 6px; background: var(--acc); color: #fff; font-size: .72rem; font-family: var(--ff); font-weight: 600; cursor: pointer; white-space: nowrap; transition: opacity .15s; }
    .btn-confirm:hover { opacity: .85; }
    .btn-confirm:disabled { opacity: .45; cursor: default; }
    .btn-danger { padding: .3rem .65rem; border: none; border-radius: 6px; background: #c0392b; color: #fff; font-size: .72rem; font-family: var(--ff); font-weight: 600; cursor: pointer; white-space: nowrap; transition: opacity .15s; }
    .btn-danger:hover { opacity: .85; }
    .btn-danger:disabled { opacity: .45; cursor: default; }
    .btn-ghost { padding: .28rem .55rem; border: 1px solid var(--border2); border-radius: 6px; background: none; font-size: .72rem; font-family: var(--ff); color: var(--tx2); cursor: pointer; white-space: nowrap; transition: all .13s; }
    .btn-ghost:hover { border-color: var(--acc); color: var(--acc); }
    .btn-ghost:disabled { opacity: .4; cursor: default; }
    .action-cell { display: flex; gap: .3rem; flex-wrap: wrap; }

    /* 페이지네이션 */
    .pagination { display: flex; justify-content: center; align-items: center; gap: .35rem; margin-top: .9rem; flex-wrap: wrap; }
    .pg-btn { padding: .28rem .6rem; border: 1px solid var(--border); border-radius: 6px; background: var(--card); font-size: .75rem; font-family: var(--ff); color: var(--tx2); cursor: pointer; transition: all .12s; }
    .pg-btn:hover { border-color: var(--acc); color: var(--acc); }
    .pg-btn.on { background: var(--acc); color: #fff; border-color: var(--acc); font-weight: 600; }
    .pg-btn:disabled { opacity: .35; cursor: default; }

    /* DM 모달 */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.35); display: none; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: var(--card); border-radius: 12px; padding: 1.4rem 1.3rem; width: 100%; max-width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,.18); }
    .modal-box h3 { margin: 0 0 .8rem; font-size: .92rem; }
    .modal-box textarea { width: 100%; border: 1.5px solid var(--border); border-radius: 8px; padding: .5rem .65rem; font-size: .82rem; font-family: var(--ff); background: var(--bg); color: var(--tx1); resize: vertical; min-height: 90px; outline: none; margin-bottom: .6rem; }
    .modal-box textarea:focus { border-color: var(--acc); }
    .modal-footer { display: flex; gap: .5rem; justify-content: flex-end; }
    .modal-footer button { padding: .38rem .85rem; border-radius: 7px; font-size: .78rem; font-family: var(--ff); cursor: pointer; font-weight: 600; border: none; }
    .modal-cancel { background: var(--bg); color: var(--tx3); border: 1px solid var(--border2) !important; }
    .modal-send { background: var(--acc); color: #fff; }

    /* 분석 차트 */
    .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: .85rem 1rem; margin-bottom: 1rem; }
    .chart-title { font-size: .78rem; font-weight: 700; color: var(--tx2); margin-bottom: .65rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: .4rem; }
    .badge-invite { background: #d4edda; color: #155724; }
    .badge-purchase { background: #cce5ff; color: #004085; }
    .badge-both { background: #e2ccff; color: #4a0082; }

    @media (max-width: 640px) {
      td, th { padding: .4rem .4rem; font-size: .72rem; }
      th:nth-child(3), td:nth-child(3),
      th:nth-child(4), td:nth-child(4) { display: none; }
    }
  </style>
</head>
<body>

<!-- 로그인 -->
<div id="login-screen">
  <div class="login-card">
    <h2>북로그 관리자</h2>
    <div id="login-err" class="err" style="display:none;"></div>
    <input type="password" id="admin-pw" class="input" placeholder="관리자 비밀번호"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn" onclick="doLogin()">로그인</button>
  </div>
</div>

<!-- 관리 화면 -->
<div id="admin-screen">
  <div class="admin-header">
    <h1>북로그 관리자</h1>
    <div style="display:flex;gap:.5rem;align-items:center;">
      <button class="btn-sm" onclick="refreshCurrent()">새로고침</button>
      <button class="btn-sm" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <!-- 탭 -->
  <div class="tab-bar">
    <button class="tab-btn on" id="tab-payment" onclick="switchTab('payment')">결제 관리</button>
    <button class="tab-btn" id="tab-users" onclick="switchTab('users')">회원 관리</button>
    <button class="tab-btn" id="tab-analytics" onclick="switchTab('analytics')">분석</button>
  </div>

  <!-- ── 결제 관리 탭 ── -->
  <div id="section-payment">
    <div id="stats-row" class="stats-row"></div>
    <div class="filter-row">
      <button class="filter-btn on" data-filter="all" onclick="setFilter('all',this)">전체</button>
      <button class="filter-btn" data-filter="pending" onclick="setFilter('pending',this)">입금 대기</button>
      <button class="filter-btn" data-filter="confirmed" onclick="setFilter('confirmed',this)">확인 완료</button>
      <button class="filter-btn" data-filter="cancelled" onclick="setFilter('cancelled',this)">취소</button>
      <span id="pay-search-hint" class="search-hint" style="display:none;"></span>
    </div>
    <div class="search-bar">
      <input type="text" id="pay-search-input" placeholder="이메일 또는 입금코드 검색…"
        onkeydown="if(event.key==='Enter')doPaySearch()"
        oninput="if(!this.value.trim())clearPaySearch()">
      <button onclick="doPaySearch()">검색</button>
      <button class="search-clear" id="pay-clear-btn" style="display:none;" onclick="clearPaySearch()">✕ 초기화</button>
    </div>
    <div id="pay-table-wrap"><div class="loading">불러오는 중…</div></div>
    <div id="pay-pagination" class="pagination"></div>
  </div>

  <!-- ── 회원 관리 탭 ── -->
  <div id="section-users" style="display:none;">
    <div id="user-stats-row" class="stats-row"></div>
    <div class="search-bar">
      <input type="text" id="user-search-input" placeholder="이메일 또는 닉네임 검색…"
        oninput="filterUsers()">
      <span id="user-search-hint" class="search-hint" style="display:none;"></span>
    </div>
    <div id="user-table-wrap"><div class="loading">불러오는 중…</div></div>
    <div id="user-pagination" class="pagination"></div>
  </div>

  <!-- ── 분석 탭 ── -->
  <div id="section-analytics" style="display:none;">
    <div id="analytics-stats-row" class="stats-row"></div>

    <div class="chart-card">
      <div class="chart-title">가입 경로 분석</div>
      <div id="chart-join-type"><div class="loading">불러오는 중…</div></div>
    </div>

    <div class="chart-card">
      <div class="chart-title">
        <span>가입 추이</span>
        <span style="display:flex;gap:.3rem;">
          <button class="filter-btn on" id="trend-btn-day" onclick="setTrend('day',this)">일간 30일</button>
          <button class="filter-btn" id="trend-btn-month" onclick="setTrend('month',this)">월간 12개월</button>
          <button class="filter-btn" id="trend-btn-year" onclick="setTrend('year',this)">연간</button>
        </span>
      </div>
      <div id="chart-trend"></div>
    </div>

    <div class="chart-card">
      <div class="chart-title">가입 시간대 분포 (KST 기준)</div>
      <div id="chart-hour"></div>
    </div>
  </div>
</div>

<!-- 임시 비밀번호 모달 -->
<div class="modal-overlay" id="pw-modal">
  <div class="modal-box">
    <h3>🔐 임시 비밀번호 설정</h3>
    <div id="pw-target-label" style="font-size:.75rem;color:var(--tx3);margin-bottom:.5rem;"></div>
    <input type="text" id="pw-input" class="input" placeholder="임시 비밀번호 (6자 이상)" autocomplete="off" style="margin-bottom:.35rem;">
    <div style="font-size:.69rem;color:var(--tx3);margin-bottom:.5rem;">사용자는 로그인 후 앱에서 직접 비밀번호를 변경하도록 안내하세요.</div>
    <div id="pw-err" style="font-size:.7rem;color:#c0392b;margin-bottom:.4rem;display:none;"></div>
    <div class="modal-footer">
      <button class="modal-cancel" onclick="closePwModal()">취소</button>
      <button class="modal-send" onclick="doSetTempPw()">설정</button>
    </div>
  </div>
</div>

<!-- DM 모달 -->
<div class="modal-overlay" id="dm-modal">
  <div class="modal-box">
    <h3>📩 쪽지 보내기</h3>
    <div id="dm-target-label" style="font-size:.75rem;color:var(--tx3);margin-bottom:.5rem;"></div>
    <textarea id="dm-content" placeholder="메시지 내용…"></textarea>
    <div id="dm-err" style="font-size:.7rem;color:#c0392b;margin-bottom:.4rem;display:none;"></div>
    <div class="modal-footer">
      <button class="modal-cancel" onclick="closeDmModal()">취소</button>
      <button class="modal-send" onclick="sendDmFromAdmin()">보내기</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://xowlwzpoxrudgaoavkbr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhvd2x3enBveHJ1ZGdhb2F2a2JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NTgxNjQsImV4cCI6MjA5MjIzNDE2NH0.Dlv8KYcQAieS1jQ9J6zjfsodco2U-m3ObuP5LXJPaVQ';
const PLAN_NAMES = { plan_a: '가입권 + 초대장 1장', plan_b: '가입권 + 초대장 2장', plan_c: '가입권 + 초대장 3장' };

const PER_PAGE = 20;
let _secret = '';
let _curTab = 'payment';

// ── 결제
let _payments = [], _filter = 'all', _paySearchQ = '', _payPage = 1;

// ── 회원
let _users = [], _userFiltered = [], _userSearchQ = '', _userPage = 1;
let _dmTarget = null;

// ── 인증
function doLogin() {
  const pw = document.getElementById('admin-pw').value.trim();
  if (!pw) return;
  _secret = pw;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-screen').style.display = 'block';
  loadPayments();
}
function doLogout() {
  _secret = ''; _payments = []; _users = [];
  document.getElementById('admin-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-pw').value = '';
}

// ── 탭 전환
function switchTab(tab) {
  _curTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('on'));
  document.getElementById('tab-' + tab).classList.add('on');
  document.getElementById('section-payment').style.display = tab === 'payment' ? '' : 'none';
  document.getElementById('section-users').style.display = tab === 'users' ? '' : 'none';
  document.getElementById('section-analytics').style.display = tab === 'analytics' ? '' : 'none';
  if (tab === 'users' && !_users.length) loadUsers();
  if (tab === 'analytics') { if (!_users.length) loadUsers(); else renderAnalytics(); }
}

function refreshCurrent() {
  if (_curTab === 'payment') loadPayments();
  else loadUsers();
}

// ─────────────────────────────────────────
// 결제 관리
// ─────────────────────────────────────────
async function callPayments(body) {
  return fetch(`${SUPABASE_URL}/functions/v1/admin-payments`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_KEY}`, 'x-admin-secret': _secret },
    body: JSON.stringify(body)
  });
}

function setFilter(f, el) {
  _filter = f; _payPage = 1;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  renderPayTable();
}
function doPaySearch() {
  _paySearchQ = document.getElementById('pay-search-input').value.trim();
  _payPage = 1;
  document.getElementById('pay-clear-btn').style.display = _paySearchQ ? '' : 'none';
  renderPayTable();
}
function clearPaySearch() {
  _paySearchQ = ''; _payPage = 1;
  document.getElementById('pay-search-input').value = '';
  document.getElementById('pay-clear-btn').style.display = 'none';
  renderPayTable();
}
function getPayFiltered() {
  let list = _filter === 'all' ? _payments : _payments.filter(p => p.status === _filter);
  if (_paySearchQ) {
    const q = _paySearchQ.toLowerCase();
    list = list.filter(p => p.email?.toLowerCase().includes(q) || p.transfer_code?.toLowerCase().includes(q) || (p.codes||[]).some(c => c.toLowerCase().includes(q)));
  }
  return list;
}

async function loadPayments() {
  document.getElementById('pay-table-wrap').innerHTML = '<div class="loading">불러오는 중…</div>';
  document.getElementById('pay-pagination').innerHTML = '';
  try {
    const res = await callPayments({ action: 'list' });
    if (res.status === 401) { doLogout(); return; }
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'fetch_failed');
    _payments = data.payments || [];
    renderPayStats();
    renderPayTable();
  } catch(e) {
    document.getElementById('pay-table-wrap').innerHTML = `<div class="empty">오류: ${e.message}</div>`;
  }
}
function renderPayStats() {
  const pending = _payments.filter(p => p.status === 'pending').length;
  const confirmed = _payments.filter(p => p.status === 'confirmed').length;
  const totalAmt = _payments.filter(p => p.status === 'confirmed').reduce((s,p) => s + p.amount, 0);
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-chip"><b>${pending}</b>입금 대기</div>
    <div class="stat-chip"><b>${confirmed}</b>확인 완료</div>
    <div class="stat-chip"><b>${totalAmt.toLocaleString()}원</b>총 확인 금액</div>
    <div class="stat-chip"><b>${_payments.length}</b>전체</div>`;
}
function renderPayTable() {
  const filtered = getPayFiltered();
  const hint = document.getElementById('pay-search-hint');
  hint.style.display = _paySearchQ ? '' : 'none';
  if (_paySearchQ) hint.textContent = `"${_paySearchQ}" 검색 결과 ${filtered.length}건`;

  if (!filtered.length) {
    document.getElementById('pay-table-wrap').innerHTML = '<div class="empty">내역이 없습니다.</div>';
    document.getElementById('pay-pagination').innerHTML = '';
    return;
  }
  const totalPages = Math.ceil(filtered.length / PER_PAGE);
  if (_payPage > totalPages) _payPage = totalPages;
  const pageItems = filtered.slice((_payPage - 1) * PER_PAGE, _payPage * PER_PAGE);

  const rows = pageItems.map(p => {
    const date = new Date(p.created_at).toLocaleString('ko-KR', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false });
    const badge = p.status === 'pending' ? '<span class="badge badge-pending">입금 대기</span>'
      : p.status === 'confirmed' ? '<span class="badge badge-confirmed">확인 완료</span>'
      : '<span class="badge badge-cancelled">취소</span>';
    const confirmBtn = p.status === 'pending'
      ? `<button class="btn-confirm" id="cbtn-${p.id}" onclick="confirmPayment('${p.id}')">✓ 확인</button>`
      : p.status === 'confirmed'
        ? `<button class="btn-confirm" id="rbtn-${p.id}" onclick="resendEmail('${p.id}')" style="background:#6b8c6b;">📧 재발송</button>`
        : '—';

  document.getElementById('pay-table-wrap').innerHTML = `

async function confirmPayment(id) {
  const btn = document.getElementById(`cbtn-${id}`);
  if (btn) { btn.disabled = true; btn.textContent = '처리 중…'; }

}

async function callUsers(body) {
  return fetch(`${SUPABASE_URL}/functions/v1/admin-users`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_KEY}`, 'x-admin-secret': _secret },
    body: JSON.stringify(body)
  });
}

async function loadUsers() {
  document.getElementById('user-table-wrap').innerHTML = '<div class="loading">불러오는 중…</div>';
  document.getElementById('user-pagination').innerHTML = '';
  try {
    const res = await callUsers({ action: 'list' });
    if (res.status === 401) { doLogout(); return; }
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'fetch_failed');
    _users = data.users || [];
    _userFiltered = _users;
    renderUserStats();
    renderUserTable();
    if (_curTab === 'analytics') renderAnalytics();
  } catch(e) {
    document.getElementById('user-table-wrap').innerHTML = `<div class="empty">오류: ${e.message}</div>`;
  }
}

function filterUsers() {
  const q = document.getElementById('user-search-input').value.trim().toLowerCase();
  _userSearchQ = q;
  _userPage = 1;
  _userFiltered = q
    ? _users.filter(u => u.email.toLowerCase().includes(q) || u.display_name.toLowerCase().includes(q))
    : _users;

  hint.style.display = q ? '' : 'none';
  if (q) hint.textContent = `${_userFiltered.length}명`;

function renderUserStats() {

    <div class="stat-chip"><b>${total}</b>전체 회원</div>

    <div class="stat-chip"><b>${confirmed}</b>이메일 인증</div>
    <div class="stat-chip"><b>${admins}</b>관리자</div>`;
}

function renderUserTable() {
  const list = _userFiltered;
  if (!list.length) {
    document.getElementById('user-table-wrap').innerHTML = '<div class="empty">회원이 없습니다.</div>';
    document.getElementById('user-pagination').innerHTML = '';
    return;
  }
  const totalPages = Math.ceil(list.length / PER_PAGE);
  if (_userPage > totalPages) _userPage = totalPages;
  const pageItems = list.slice((_userPage - 1) * PER_PAGE, _userPage * PER_PAGE);

  const rows = pageItems.map(u => {
    const joinDate = new Date(u.created_at).toLocaleDateString('ko-KR', { year:'2-digit', month:'2-digit', day:'2-digit' });
    const lastLogin = u.last_sign_in_at
      ? new Date(u.last_sign_in_at).toLocaleDateString('ko-KR', { month:'2-digit', day:'2-digit' })
      : '—';
    const roleBadge = u.role === 'admin' ? '<span class="badge badge-admin">관리자</span>' : '<span class="badge badge-user">일반</span>';
    const joinBadge = u.join_type === 'invite' ? '<span class="badge badge-invite">초대</span>'
      : u.join_type === 'purchase' ? '<span class="badge badge-purchase">구매</span>'
      : u.join_type === 'both' ? '<span class="badge badge-both">초대+구매</span>'
      : '';
    const emailBadge = u.email_confirmed ? '<span class="badge badge-ok">인증</span>' : '<span class="badge badge-no">미인증</span>';
    const uid = escAttr(u.id), email = escAttr(u.email), name = escAttr(u.display_name);
    return `<tr>
      <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${name}">${esc(u.display_name)}</td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${email}">${esc(u.email)}</td>
      <td>${roleBadge} ${joinBadge}</td>
      <td>${emailBadge}</td>
      <td>${joinDate}</td>
      <td>${lastLogin}</td>
      <td>
        <div class="action-cell">
          <button class="btn-ghost" onclick="openPwModal('${uid}','${name}')" title="임시 비밀번호 설정">🔐 임시PW</button>
          <button class="btn-ghost" onclick="sendPwReset('${email}')" title="비밀번호 재설정 이메일 발송">🔑 재설정</button>
          <button class="btn-ghost" onclick="openDmModal('${uid}','${name}')" title="쪽지 보내기">💬 쪽지</button>
          <button class="btn-danger" onclick="deleteUser('${uid}','${name}')">삭제</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('user-table-wrap').innerHTML = `
    <table><thead><tr>
      <th>닉네임</th><th>이메일</th><th>역할</th><th>이메일</th><th>가입일</th><th>최근 로그인</th><th>관리</th>
    </tr></thead><tbody>${rows}</tbody></table>`;
  renderPagination('user', totalPages, _userPage, () => renderUserTable());
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return String(s||'').replace(/'/g,"\\'"); }

async function sendPwReset(email) {
  if (!confirm(`${email} 에 비밀번호 재설정 링크를 발송할까요?`)) return;
  try {
    const res = await callUsers({ action: 'send_pw_reset', email });
    const data = await res.json();
    if (!res.ok) alert('오류: ' + (data.error||'') + (data.detail ? '\n'+JSON.stringify(data.detail):''));
    else alert('재설정 이메일을 발송했습니다.');
  } catch(e) { alert('네트워크 오류: ' + e.message); }
}

async function deleteUser(userId, displayName) {
  if (!confirm(`"${displayName}" 계정을 삭제할까요?\n\n이 작업은 되돌릴 수 없습니다.\n(책, 문장 기록은 별도로 남을 수 있어요)`)) return;
  if (!confirm(`마지막 확인: "${displayName}" 계정을 정말 삭제하나요?`)) return;
  try {
    const res = await callUsers({ action: 'delete', user_id: userId });
    const data = await res.json();
    if (!res.ok) { alert('삭제 오류: ' + (data.error||'') + (data.detail ? '\n'+data.detail:'')); return; }
    alert('삭제됐습니다.');
    await loadUsers();
  } catch(e) { alert('네트워크 오류: ' + e.message); }
}

// ── 공통 페이지네이션
function renderPagination(ns, totalPages, curPage, onGo) {
  const pg = document.getElementById(ns + '-pagination');
  if (!pg) return;
  if (totalPages <= 1) { pg.innerHTML = ''; return; }
  let html = `<button class="pg-btn" onclick="goPg('${ns}',${curPage-1})" ${curPage===1?'disabled':''}>‹</button>`;
  for (let i = 1; i <= totalPages; i++) {
    if (totalPages > 7 && i > 2 && i < totalPages - 1 && Math.abs(i - curPage) > 1) {
      if (i === 3 || i === totalPages - 2) html += `<span style="padding:0 .2rem;color:var(--tx3);">…</span>`;
      continue;
    }
    html += `<button class="pg-btn ${i===curPage?'on':''}" onclick="goPg('${ns}',${i})">${i}</button>`;
  }
  html += `<button class="pg-btn" onclick="goPg('${ns}',${curPage+1})" ${curPage===totalPages?'disabled':''}>›</button>`;
  html += `<span style="font-size:.7rem;color:var(--tx3);margin-left:.3rem;">${curPage}/${totalPages}</span>`;
  pg.innerHTML = html;
}
function goPg(ns, p) {
  if (ns === 'pay') { _payPage = p; renderPayTable(); }
  else { _userPage = p; renderUserTable(); }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function kstDayKey(isoStr) {
  const d = new Date(new Date(isoStr).getTime() + 9 * 3600 * 1000);
  return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
}

function kstMonthKey(isoStr) {
  const d = new Date(new Date(isoStr).getTime() + 9 * 3600 * 1000);
  return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}`;
}

function renderTrendChart() {
  const now = new Date();
  let items = [];

  if (_trendPeriod === 'day') {
    const dayCounts = {};
    _users.forEach(u => { const k = kstDayKey(u.created_at); dayCounts[k] = (dayCounts[k]||0)+1; });
    const kstNow = new Date(now.getTime() + 9*3600*1000);
    for (let i = 29; i >= 0; i--) {
      const d = new Date(Date.UTC(kstNow.getUTCFullYear(), kstNow.getUTCMonth(), kstNow.getUTCDate() - i));
      const key = `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
      const label = `${d.getUTCMonth()+1}/${d.getUTCDate()}`;
      const shortLabel = (i === 29 || i === 0 || i % 7 === 0) ? label : '';
      items.push({ label, shortLabel, value: dayCounts[key]||0 });
    }
  } else if (_trendPeriod === 'month') {
    const moCounts = {};
    _users.forEach(u => { const k = kstMonthKey(u.created_at); moCounts[k] = (moCounts[k]||0)+1; });
    for (let i = 11; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      const label = `${String(d.getFullYear()).slice(2)}/${String(d.getMonth()+1).padStart(2,'0')}`;
      items.push({ label, value: moCounts[key]||0 });
    }
  } else {
    const yrCounts = {};
    _users.forEach(u => { const y = new Date(u.created_at).getFullYear(); yrCounts[y] = (yrCounts[y]||0)+1; });
    const years = Object.keys(yrCounts).map(Number).sort();
    if (!years.length) years.push(now.getFullYear());
    years.forEach(y => items.push({ label: String(y), value: yrCounts[y]||0 }));
  }

  document.getElementById('chart-trend').innerHTML = makeBarChart(items);
}

function renderHourChart() {
  const hourCounts = Array(24).fill(0);
  _users.forEach(u => { hourCounts[(new Date(u.created_at).getUTCHours() + 9) % 24]++; });
  const items = hourCounts.map((v, h) => ({
    label: `${h}시`,
    shortLabel: h % 6 === 0 ? `${h}시` : (h % 3 === 0 ? `${h}` : ''),
    value: v,
  }));
  document.getElementById('chart-hour').innerHTML = makeBarChart(items);
}

function makeBarChart(items, barH = 100, unit = '명') {
  if (!items.length) return '<div style="text-align:center;padding:1rem;font-size:.78rem;color:var(--tx3);">데이터 없음</div>';
  const maxVal = Math.max(...items.map(i => i.value), 1);
  const bars = items.map(item => {
    const filled = Math.max(Math.round((item.value / maxVal) * barH), item.value ? 3 : 0);
    const spacer = barH - filled;
    const lbl = item.shortLabel !== undefined ? item.shortLabel : item.label;
    const valLabel = item.value ? (item.value >= 1000 ? `${(item.value/1000).toFixed(1)}k` : item.value) : '';
    return `<div style="flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;" title="${item.label}: ${item.value}${unit}">
      <span style="font-size:.5rem;color:var(--acc);display:block;height:12px;line-height:12px;text-align:center;font-weight:600;">${valLabel}</span>
      <div style="height:${spacer}px;"></div>
      <div style="width:calc(100% - 2px);max-width:32px;height:${filled}px;background:linear-gradient(to top,var(--acc),#e8943a);border-radius:3px 3px 0 0;"></div>
      <div style="width:100%;font-size:.48rem;color:var(--tx3);text-align:center;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${lbl}</div>
    </div>`;
  }).join('');
  return `<div style="display:flex;gap:1px;overflow-x:hidden;padding-bottom:2px;border-bottom:1px solid var(--border);">${bars}</div>`;
}

function renderActivityStats() {
  const { totals, daily } = _activityStats;
  const periodTotal = Object.values(daily || {}).reduce((s, d) => s + d.total, 0);
  const periodDau = new Set(Object.values(daily || {}).flatMap(d => Array(d.dau).fill(null))).size; // rough
  document.getElementById('activity-stats-row').innerHTML = `
    <div class="stat-chip"><b>${totals.books.toLocaleString()}</b>전체 책 기록</div>
    <div class="stat-chip"><b>${totals.posts.toLocaleString()}</b>전체 게시글</div>
    <div class="stat-chip"><b>${totals.quotes.toLocaleString()}</b>전체 문장</div>
    <div class="stat-chip"><b>${totals.comments.toLocaleString()}</b>전체 댓글</div>
    <div class="stat-chip"><b>${periodTotal.toLocaleString()}</b>최근 ${_actPeriod}일 활동</div>
    <div class="stat-chip"><b>${Math.round(periodTotal / _actPeriod * 10) / 10}</b>일평균 활동</div>`;
}

function renderLoginHourChart() {
  if (!_users.length) { document.getElementById('chart-login-hour').innerHTML = '<div class="empty">데이터 없음</div>'; return; }
  const hours = Array(24).fill(0);
  _users.filter(u => u.last_sign_in_at).forEach(u => { hours[(new Date(u.last_sign_in_at).getUTCHours() + 9) % 24]++; });
  document.getElementById('chart-login-hour').innerHTML = makeBarChart(
    hours.map((v, h) => ({ label:`${h}시`, shortLabel: h%6===0?`${h}시`:h%3===0?`${h}`:'', value:v }))
  );
}

function renderActivityHourChart() {
  document.getElementById('chart-activity-hour').innerHTML = makeBarChart(
    (_activityStats.by_hour||Array(24).fill(0)).map((v,h) => ({ label:`${h}시`, shortLabel:h%6===0?`${h}시`:h%3===0?`${h}`:'', value:v })),
    100, '회'
  );
}

function renderActivityWeekdayChart() {
  const DAYS = ['월','화','수','목','금','토','일'];
  document.getElementById('chart-activity-weekday').innerHTML = makeBarChart(
    (_activityStats.by_weekday||Array(7).fill(0)).map((v,i) => ({ label:DAYS[i], shortLabel:DAYS[i], value:v })),
    100, '회'
  );
}

function renderActivityDailyChart() {
  const daily = _activityStats.daily || {};
  const kstNow = new Date(Date.now() + 9*3600*1000);
  const items = [];
  for (let i = _actPeriod-1; i >= 0; i--) {
    const d = new Date(Date.UTC(kstNow.getUTCFullYear(), kstNow.getUTCMonth(), kstNow.getUTCDate()-i));
    const key = `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
    const label = `${d.getUTCMonth()+1}/${d.getUTCDate()}`;
    const shortLabel = (i===_actPeriod-1||i===0||i%7===0) ? label : '';
    items.push({ label, shortLabel, value: _dailyMode==='dau' ? (daily[key]?.dau||0) : (daily[key]?.total||0) });
  }
  document.getElementById('chart-activity-daily').innerHTML = makeBarChart(items, 100, _dailyMode==='dau' ? '명' : '회');
}

function renderActivityTypesChart() {
  const daily = _activityStats.daily || {};
  let bk=0, pt=0, qt=0, cm=0;
  for (const d of Object.values(daily)) { bk+=d.books; pt+=d.posts; qt+=d.quotes; cm+=d.comments; }
  const total = bk+pt+qt+cm || 1;
  const groups = [
    { label:'📚 책 기록', count:bk, color:'#3d9970' },
    { label:'✍️ 게시글', count:pt, color:'#2176ae' },
    { label:'✨ 문장',   count:qt, color:'#9b59b6' },
    { label:'💬 댓글',   count:cm, color:'#c0392b' },
  ];
  document.getElementById('chart-activity-types').innerHTML = groups.map(g => {
    const pct = Math.round((g.count/total)*100);
    return `<div style="margin-bottom:.55rem;">
      <div style="display:flex;justify-content:space-between;font-size:.72rem;margin-bottom:.22rem;">
        <span>${g.label}</span>
        <span style="color:var(--tx3);">${g.count.toLocaleString()}회&nbsp;(${pct}%)</span>
      </div>
      <div style="background:var(--bg);border-radius:4px;height:10px;overflow:hidden;">
        <div style="height:100%;width:${pct}%;background:${g.color};border-radius:4px;min-width:${g.count?'3px':'0'};"></div>
      </div>
    </div>`;
  }).join('');
}

function renderTopUsersChart() {
  const users = _activityStats.top_users || [];
  const el = document.getElementById('chart-top-users');
  if (!users.length) { el.innerHTML = '<div class="empty">데이터 없음</div>'; return; }
  const rows = users.map((u,i) => `<tr>
    <td style="color:var(--tx3);width:1.8rem;">${i+1}</td>
    <td><b>${esc(u.display_name)}</b></td>
    <td style="text-align:center;">${u.books}</td>
    <td style="text-align:center;">${u.posts}</td>
    <td style="text-align:center;">${u.quotes}</td>
    <td style="text-align:center;">${u.comments}</td>
    <td style="text-align:center;font-weight:700;color:var(--acc);">${u.total}</td>
  </tr>`).join('');
  el.innerHTML = `<div style="overflow-x:auto;"><table style="font-size:.75rem;min-width:360px;">
    <thead><tr><th>#</th><th>닉네임</th><th style="text-align:center;">📚</th><th style="text-align:center;">✍️</th><th style="text-align:center;">✨</th><th style="text-align:center;">💬</th><th style="text-align:center;">합계</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
  document.getElementById('top-users-title').textContent = `최다 활동 유저 TOP 10 (최근 ${_actPeriod}일)`;
}

// ESC로 모달 닫기
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeDmModal(); closePwModal(); } });
document.getElementById('dm-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeDmModal(); });
document.getElementById('pw-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closePwModal(); });
</script>
