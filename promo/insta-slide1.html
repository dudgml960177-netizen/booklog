<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=DM+Serif+Display:ital@0;1&family=Lato:wght@300;400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Noto Serif KR', serif;
    background: #f5ede0;
  }

  .slide {
    width: 1080px;
    height: 1080px;
    background: #f5ede0;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* 배경 장식 */
  .bg-circle1 {
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, #e8d5b8 0%, transparent 70%);
    top: -150px; right: -100px;
    opacity: .5;
  }
  .bg-circle2 {
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, #d4c4a8 0%, transparent 70%);
    bottom: -80px; left: -60px;
    opacity: .4;
  }
  .bg-lines {
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 59px,
      rgba(180,155,120,.12) 60px
    );
  }

  /* 로고 */
  .logo-area {
    position: relative;
    z-index: 2;
    text-align: center;
    margin-bottom: 52px;
  }
  .logo-text {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 88px;
    color: #3a2c1a;
    letter-spacing: -2px;
    line-height: 1;
  }
  .logo-sub {
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #9a7a55;
    margin-top: 10px;
  }

  /* 태그라인 */
  .tagline {
    position: relative;
    z-index: 2;
    text-align: center;
  }
  .tagline-main {
    font-size: 38px;
    font-weight: 700;
    color: #2a1e0e;
    line-height: 1.35;
    letter-spacing: -0.5px;
  }
  .tagline-main em {
    font-style: normal;
    color: #c4714a;
  }
  .tagline-sub {
    font-size: 20px;
    font-weight: 400;
    color: #7a6040;
    margin-top: 18px;
    line-height: 1.6;
  }

  /* 데코 구분선 */
  .deco-line {
    width: 60px;
    height: 2px;
    background: #c4714a;
    margin: 36px auto;
    position: relative;
    z-index: 2;
  }

  /* 미니 기능 칩 */
  .chips {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
    position: relative;
    z-index: 2;
    margin-top: 8px;
  }
  .chip {
    background: #fff;
    border: 1.5px solid #d4c0a0;
    border-radius: 50px;
    padding: 10px 22px;
    font-size: 16px;
    color: #5a4030;
    font-weight: 600;
    letter-spacing: .3px;
    box-shadow: 0 2px 8px rgba(120,80,40,.08);
  }
  .chip.accent {
    background: #c4714a;
    border-color: #c4714a;
    color: #fff;
  }

  /* 하단 URL */
  .bottom-url {
    position: absolute;
    bottom: 46px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Lato', sans-serif;
    font-size: 15px;
    color: #9a7a55;
    letter-spacing: 1px;
    z-index: 2;
  }

  /* 슬라이드 번호 */
  .slide-num {
    position: absolute;
    top: 46px; right: 52px;
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    color: #b8a080;
    letter-spacing: 2px;
    z-index: 2;
  }

  /* 오픈 북 일러스트 */
  .book-deco {
    position: absolute;
    bottom: 80px;
    right: 60px;
    opacity: .07;
    font-size: 260px;
    line-height: 1;
    z-index: 1;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="bg-circle1"></div>
  <div class="bg-circle2"></div>
  <div class="bg-lines"></div>

  <div class="book-deco">📖</div>

  <div class="slide-num">01 / 03</div>

  <div class="logo-area">
    <div class="logo-text">Bok Log</div>
    <div class="logo-sub">Reading Journal App</div>
  </div>

  <div class="tagline">
    <div class="tagline-main">
      내가 읽은 모든 책,<br>
      <em>한 곳에서 기록하다</em>
    </div>
    <div class="tagline-sub">
      독서 타이머 · 문장 수첩 · 통계 · 달력<br>
      읽는 삶을 더 풍요롭게
    </div>
  </div>

  <div class="deco-line"></div>

  <div class="chips">
    <div class="chip">📚 서재 관리</div>
    <div class="chip accent">⏱ 독서 타이머</div>
    <div class="chip">✍ 문장 수첩</div>
    <div class="chip">📊 독서 통계</div>
  </div>

  <div class="bottom-url">boklog-neon.vercel.app</div>
</div>
</body>
</html>
