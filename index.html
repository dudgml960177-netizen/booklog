<!-- ═══ 주요 변경사항만 표시합니다 ═══
     전체 index.html에서 아래 부분만 교체하세요.
     나머지는 동일합니다.
-->

<!-- ═══════════════════════════════════════
     변경 1: FAB 버튼 (z-index 800, 잉크색)
     기존 #fab-add-book 을 찾아서 교체
     ═══════════════════════════════════════ -->
<button id="fab-add-book" onclick="openAddBook()" title="책 추가"
  style="position:fixed;right:1.6rem;bottom:2.2rem;
    z-index:800;width:48px;height:48px;border-radius:50%;
    background:#2a1f10;color:#fff;font-size:1.5rem;font-weight:300;
    border:none;cursor:pointer;
    box-shadow:0 4px 20px rgba(42,31,16,.28);
    display:none;align-items:center;justify-content:center;
    transition:transform .15s,box-shadow .15s;"
  onmouseenter="this.style.transform='scale(1.08)'"
  onmouseleave="this.style.transform='scale(1)'">＋</button>


<!-- ═══════════════════════════════════════
     변경 2: 책 추가/수정 모달 헤더
     기존 modal-book 내부의 첫 번째 div(헤더)를 교체
     ═══════════════════════════════════════ -->
<!-- 기존: <div style="background:var(--paper);border-bottom:..."> -->
<!-- 교체: -->
<div class="modal-header">
  <div id="modal-book-title" class="modal-title">책 추가</div>
  <button class="modal-close" onclick="closeModal('modal-book')">✕</button>
</div>


<!-- ═══════════════════════════════════════
     변경 3: 서재 패널 (p-books) 상단 리디자인
     기존 <div class="books-toolbar"> ~ </div> 전체를 교체
     ═══════════════════════════════════════ -->
<div class="panel on" id="p-books">
  <!-- 동적으로 renderLibraryHero()가 채울 영역 -->
  <div id="library-hero"></div>
  <!-- 갤러리 뷰 -->
  <div id="view-gallery">
    <div class="gallery" id="gal-grid">
      <div class="empty-state">아직 기록된 책이 없어요.<br>+ 버튼으로 첫 책을 추가해보세요!</div>
    </div>
  </div>
  <!-- 리스트 뷰 -->
  <div id="view-list" style="display:none;">
    <div class="book-list" id="book-list-items"></div>
  </div>
</div>


<!-- ═══════════════════════════════════════
     변경 4: 문장 패널 (p-quotes) 상단
     ═══════════════════════════════════════ -->
<div class="panel" id="p-quotes">
  <div id="q-tab-header"></div>
  <div class="q-filter" id="q-filter"></div>
  <div class="quote-feed" id="q-feed">
    <div class="empty-state">수집된 문장이 없어요.</div>
  </div>
</div>


<!-- ═══════════════════════════════════════
     변경 5: 기록 패널 (p-record) 상단 히어로 추가
     기존 <div class="panel" id="p-record"> 안에
     <div class="record-top"> 앞에 삽입
     ═══════════════════════════════════════ -->
<div class="panel" id="p-record">
  <div id="record-hero"></div>  <!-- JS가 채움 -->
  <div class="record-top">
    <!-- 이하 기존 코드 동일 -->


<!-- ═══════════════════════════════════════
     변경 6: 통계 패널 (p-graph) 상단 히어로 추가
     기존 <div class="panel" id="p-graph"> 안에
     목표 카드 앞에 삽입
     ═══════════════════════════════════════ -->
<div class="panel" id="p-graph">
  <div id="stats-hero"></div>  <!-- JS가 채움 -->
  <!-- 이하 기존 코드 동일 -->


<!-- ═══════════════════════════════════════
     변경 7: 프로필 모달에 폰트 스타일 섹션 추가
     기존 '글자 크기' div 아래에 삽입
     ═══════════════════════════════════════ -->
<!-- 폰트 스타일 설정 (글자 크기 설정 바로 아래) -->
<div style="margin-bottom:.75rem;padding:.6rem .8rem;background:#faf6ef;border:1px solid var(--border);border-radius:var(--rs);">
  <div style="font-size:.72rem;font-weight:600;color:var(--tx2);margin-bottom:.5rem;">🖊️ 폰트 스타일</div>
  <select id="user-font-select" class="form-input" style="font-size:.78rem;" onchange="applySystemFont(this.value)">
    <option value="">Pretendard (기본)</option>
    <option value="'Noto Sans KR',sans-serif">Noto Sans KR</option>
    <option value="'Noto Serif KR',serif">Noto Serif KR</option>
    <option value="'Cormorant Garamond','Noto Serif KR',serif">Cormorant Garamond</option>
    <option value="'IBM Plex Mono','Courier New',monospace">IBM Plex Mono</option>
  </select>
  <div id="user-font-preview" style="margin-top:.4rem;padding:.4rem .6rem;background:var(--paper);border-radius:var(--rs);font-size:.75rem;color:var(--tx1);">책장 안의 노트 — 나의 서재</div>
</div>
