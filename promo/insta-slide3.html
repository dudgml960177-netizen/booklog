<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=DM+Serif+Display:ital@0;1&family=Lato:wght@300;400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Noto Serif KR', serif;
    background: #f5ede0;
  }

  .slide {
    width: 1080px;
    height: 1080px;
    background: #f5ede0;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 70px;
  }

  /* 배경 */
  .bg-pattern {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(196,113,74,.06) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(120,80,40,.06) 0%, transparent 50%);
  }
  .bg-border {
    position: absolute;
    inset: 28px;
    border: 1.5px solid rgba(180,140,90,.25);
    border-radius: 8px;
    pointer-events: none;
  }

  /* 인용구 박스 */
  .quote-box {
    background: #fff;
    border-radius: 24px;
    padding: 48px 52px;
    width: 100%;
    max-width: 860px;
    box-shadow: 0 8px 40px rgba(120,80,40,.10);
    border: 1px solid #e8d8c0;
    position: relative;
    z-index: 2;
    margin-bottom: 52px;
  }
  .quote-mark {
    font-family: 'DM Serif Display', serif;
    font-size: 80px;
    color: #c4714a;
    line-height: .7;
    margin-bottom: 16px;
    display: block;
  }
  .quote-text {
    font-size: 24px;
    font-weight: 600;
    color: #2a1e0e;
    line-height: 1.7;
    letter-spacing: -.2px;
    margin-bottom: 24px;
  }
  .quote-meta {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .quote-cover {
    width: 28px; height: 40px;
    background: linear-gradient(135deg, #c4714a, #8a4a20);
    border-radius: 3px;
    flex-shrink: 0;
    box-shadow: 2px 2px 6px rgba(0,0,0,.15);
  }
  .quote-book {
    font-size: 14px;
    color: #7a5a35;
    font-weight: 600;
  }
  .quote-author {
    font-size: 13px;
    color: #b09070;
  }
  .hl-badge {
    margin-left: auto;
    display: flex;
    gap: 6px;
  }
  .hl-dot {
    width: 20px; height: 20px;
    border-radius: 50%;
  }

  /* CTA */
  .cta-area {
    text-align: center;
    position: relative; z-index: 2;
  }
  .cta-label {
    font-family: 'Lato', sans-serif;
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #9a7a55;
    margin-bottom: 16px;
  }
  .cta-text {
    font-size: 36px;
    font-weight: 700;
    color: #2a1e0e;
    line-height: 1.3;
    margin-bottom: 24px;
  }
  .cta-text em {
    color: #c4714a;
    font-style: normal;
  }
  .cta-btn {
    display: inline-block;
    background: #c4714a;
    color: #fff;
    font-family: 'Lato', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 16px 48px;
    border-radius: 50px;
    box-shadow: 0 6px 24px rgba(196,113,74,.35);
  }

  /* 하단 */
  .slide-num {
    position: absolute;
    bottom: 46px; right: 52px;
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    color: #b8a080;
    letter-spacing: 2px;
    z-index: 2;
  }
  .logo-small {
    position: absolute;
    bottom: 44px; left: 52px;
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 22px;
    color: #9a7a55;
    z-index: 2;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="bg-pattern"></div>
  <div class="bg-border"></div>

  <!-- 문장 카드 예시 -->
  <div class="quote-box">
    <span class="quote-mark">"</span>
    <div class="quote-text">
      책은 도끼다. 우리 안에 얼어붙은<br>
      바다를 깨는 도끼.
    </div>
    <div class="quote-meta">
      <div class="quote-cover"></div>
      <div>
        <div class="quote-book">카프카의 편지</div>
        <div class="quote-author">— 프란츠 카프카</div>
      </div>
      <div class="hl-badge">
        <div class="hl-dot" style="background:#f5e27a;"></div>
        <div class="hl-dot" style="background:#b8e8d4;"></div>
        <div class="hl-dot" style="background:#f5c4a0;"></div>
      </div>
    </div>
  </div>

  <!-- CTA -->
  <div class="cta-area">
    <div class="cta-label">Start Today</div>
    <div class="cta-text">
      오늘 읽은 문장부터<br>
      <em>Bok Log</em>에 담아보세요
    </div>
    <div class="cta-btn">무료로 시작하기 →</div>
  </div>

  <div class="logo-small">Bok Log</div>
  <div class="slide-num">03 / 03</div>
</div>
</body>
</html>
