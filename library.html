<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>도서관 · 북로그</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    :root{
      --bg:#f2ece0;--card:#faf6ef;--border:#ddd0b8;--border2:#cfc3ac;
      --tx1:#2e1f0e;--tx2:#5c3d1e;--tx3:#a08c72;
      --acc:#b07030;--acc2:#7a3e18;
      --ff:'Pretendard','Apple SD Gothic Neo',sans-serif;
      --fs:'DM Serif Display',serif;
      --rs:4px;--r:7px;
      --tbl:#b8a07a; /* 테이블 격자선/표면 색 */
    }
    html{min-height:100%;background:var(--bg);}
    body{
      min-height:100vh;display:flex;flex-direction:column;
      font-family:var(--ff);color:var(--tx1);
      background:linear-gradient(160deg,#fdf8f0 0%,#ede2cc 100%);
    }

    /* ── 헤더 ── */
    .hd{
      background:rgba(250,246,239,.96);backdrop-filter:blur(10px);
      border-bottom:1px solid var(--border);
      padding:.48rem .9rem;
      display:flex;align-items:center;justify-content:space-between;gap:.5rem;
      position:sticky;top:0;z-index:10;flex-shrink:0;
    }
    .hd-left{display:flex;align-items:center;gap:.45rem;}
    .hd-logo{font-family:var(--fs);font-size:.95rem;color:var(--tx1);white-space:nowrap;}
    .hd-sep{color:var(--border2);font-size:.8rem;}
    .hd-title{font-size:.7rem;color:var(--tx2);font-weight:600;white-space:nowrap;}
    .hd-chip{
      background:var(--acc);color:#fff;
      font-size:.58rem;font-weight:600;
      padding:.1rem .42rem;border-radius:20px;white-space:nowrap;
    }
    .hd-right{display:flex;align-items:center;gap:.5rem;flex-shrink:0;}
    .hd-time{text-align:right;}
    .hd-clock{font-size:.66rem;font-weight:600;color:var(--tx2);font-variant-numeric:tabular-nums;letter-spacing:.04em;}
    .hd-elapsed-row{display:flex;align-items:center;gap:.2rem;justify-content:flex-end;}
    .hd-elapsed-lbl{font-size:.55rem;color:var(--tx3);}
    .hd-elapsed{font-size:.66rem;font-weight:700;color:var(--acc);font-variant-numeric:tabular-nums;}
    .btn-leave{
      font-size:.67rem;padding:.26rem .62rem;
      background:none;color:var(--tx2);
      border:1px solid var(--border2);border-radius:var(--rs);
      cursor:pointer;font-family:var(--ff);white-space:nowrap;
      transition:background .15s,color .15s;
    }
    .btn-leave:hover{background:var(--border);color:var(--tx1);}

    /* ── 메인 ── */
    .main{
      flex:1;padding:.9rem .7rem 2rem;
      display:flex;flex-direction:column;align-items:center;
    }

    /* ── 테이블 래퍼 ── */
    .tbl-wrap{width:min(520px,96vw);}

    /* READING TABLE 레이블 */
    .tbl-label{
      font-size:.58rem;font-weight:700;letter-spacing:.22em;
      color:var(--tx3);text-transform:uppercase;
      margin-bottom:.45rem;padding-left:.15rem;
    }

    /* 격자 테이블: 갈색 배경 + 1px gap = 격자선 */
    .tbl-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:1px;
      background:var(--tbl);
      border:1.5px solid var(--tbl);
      border-radius:13px;
      overflow:hidden;
    }

    /* 일반 좌석 셀 */
    .tbl-cell{
      background:var(--card);
      min-height:118px;
      padding:.55rem .38rem .42rem;
      display:flex;flex-direction:column;align-items:center;gap:.26rem;
      position:relative;cursor:default;
      transition:background .12s;
      animation:cellIn .2s ease;
    }
    @keyframes cellIn{from{opacity:0}to{opacity:1}}
    .tbl-cell:hover{background:#f4efe5;}

    /* 빈 좌석 셀 */
    .tbl-empty{
      background:var(--card);
      min-height:118px;
    }

    /* 테이블 표면 셀 (갈색) — 배경 없이 격자 컨테이너 색 노출 */
    .tbl-surface{
      background:var(--tbl);
      min-height:118px;
    }

    /* 아바타 래퍼 */
    .tbl-av{position:relative;flex-shrink:0;}

    /* "나" 배지 */
    .tbl-me{
      position:absolute;top:-3px;right:-3px;
      width:18px;height:18px;
      background:var(--acc);color:#fff;
      border-radius:50%;border:1.5px solid var(--card);
      font-size:.5rem;font-weight:700;
      display:flex;align-items:center;justify-content:center;
      z-index:1;
    }

    /* 이름 */
    .tbl-name{
      font-size:.62rem;font-weight:600;color:var(--tx1);
      text-align:center;width:100%;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }

    /* 책 카드 */
    .tbl-book{
      display:flex;align-items:center;gap:.28rem;
      background:#fff;border:1px solid var(--border);border-radius:5px;
      padding:.22rem .3rem;width:100%;overflow:hidden;
    }
    .tbl-cover{
      width:20px;height:28px;border-radius:2px;
      object-fit:cover;flex-shrink:0;
      background:#e8e0d0;display:block;
    }
    .tbl-book-title{
      font-size:.54rem;color:var(--tx2);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      line-height:1.3;
    }

    /* 유령 이모지 */
    .tbl-ghost-ico{font-size:2.2rem;line-height:1;margin-top:.1rem;}

    /* 호버 툴팁 (책+잔류시간) */
    .tbl-tip{
      display:none;position:absolute;
      bottom:calc(100% + 9px);left:50%;transform:translateX(-50%);
      background:rgba(28,14,4,.9);color:#fff;
      font-size:.62rem;padding:.36rem .6rem;border-radius:8px;
      white-space:normal;text-align:center;line-height:1.55;
      z-index:200;max-width:170px;pointer-events:none;
      box-shadow:0 3px 12px rgba(0,0,0,.22);
    }
    .tbl-tip::after{
      content:'';position:absolute;
      top:100%;left:50%;transform:translateX(-50%);
      border:5px solid transparent;
      border-top-color:rgba(28,14,4,.9);
    }
    .tbl-cell:hover .tbl-tip{display:block;}

    /* ── 로딩 ── */
    .loading{text-align:center;padding:3rem;color:var(--tx3);font-size:.78rem;}
    .spinner{
      width:20px;height:20px;
      border:2px solid var(--border);border-top-color:var(--acc);
      border-radius:50%;animation:spin .8s linear infinite;margin:0 auto .75rem;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── 에러/빈 상태 ── */
    .empty{text-align:center;padding:2rem 1rem;color:var(--tx3);}
    .empty-icon{font-size:1.6rem;margin-bottom:.4rem;}
    .empty-txt{font-size:.74rem;line-height:1.75;}
  </style>
</head>
<body>

<!-- 헤더 -->
<div class="hd">
  <div class="hd-left">
    <span class="hd-logo">Booklog</span>
    <span class="hd-sep">·</span>
    <span class="hd-title">도서관</span>
    <span class="hd-chip" id="lib-count">0명</span>
  </div>
  <div class="hd-right">
    <div class="hd-time">
      <div class="hd-clock" id="lib-clock">00:00:00</div>
      <div class="hd-elapsed-row">
        <span class="hd-elapsed-lbl">체류</span>
        <span class="hd-elapsed" id="lib-elapsed">0s</span>
      </div>
    </div>
    <button class="btn-leave" id="btn-leave" onclick="leaveLibrary()">나가기</button>
  </div>
</div>

<!-- 메인 -->
<div class="main" id="lib-main">
  <div class="loading"><div class="spinner"></div>입장 중...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://xowlwzpoxrudgaoavkbr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhvd2x3enBveHJ1ZGdhb2F2a2JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NTgxNjQsImV4cCI6MjA5MjIzNDE2NH0.Dlv8KYcQAieS1jQ9J6zjfsodco2U-m3ObuP5LXJPaVQ';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth:{ persistSession:true, storageKey:'booklog-auth', storage:window.localStorage, autoRefreshToken:true }
});

let params={}, channel=null, joinedAt=null, clockTick=null, renderTick=null, myUserId=null;

/* ── 시계 ── */
function startClock() {
  function tick() {
    const n=new Date(), pad=v=>String(v).padStart(2,'0');
    const cl=document.getElementById('lib-clock');
    if(cl) cl.textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
    const el=document.getElementById('lib-elapsed');
    if(el&&joinedAt){
      const s=Math.floor((Date.now()-joinedAt)/1000);
      const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;
      el.textContent=h>0?`${h}h ${m}m`:m>0?`${m}m ${sc}s`:`${sc}s`;
    }
  }
  tick();
  clockTick=setInterval(tick,1000);
}

/* ── 잔류 시간 문자열 ── */
function elapsedStr(ts) {
  if(!ts) return '';
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<60) return '방금 입장';
  const m=Math.floor(s/60), h=Math.floor(m/60);
  return h>0?`${h}시간 ${m%60}분 독서 중`:`${m}분 독서 중`;
}

/* ── 아바타 HTML ── */
function makeAv(name,url,size){
  const initial=(name||'독').slice(0,1).toUpperCase();
  const colors=['#b07030','#6b8f6b','#5a7a8a','#8b6b8b','#c4714a'];
  const bg=colors[(name||'').charCodeAt(0)%colors.length];
  if(url) return `<img src="${url.replace(/'/g,'%27')}" style="width:${size}px;height:${size}px;border-radius:50%;border:2px solid #ddd0b8;object-fit:cover;" onerror="this.outerHTML='<div style=width:${size}px;height:${size}px;border-radius:50%;background:${bg};border:2px solid #ddd0b8;display:flex;align-items:center;justify-content:center;font-size:${Math.round(size*.38)}px;font-weight:600;color:#fff;>${initial}</div>'">`;
  return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${bg};border:2px solid #ddd0b8;display:flex;align-items:center;justify-content:center;font-size:${Math.round(size*.38)}px;font-weight:600;color:#fff;">${initial}</div>`;
}

/* ── HTML 이스케이프 ── */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ── 책 카드 HTML ── */
function makeBookCard(m){
  if(!m.book_title) return '';
  const short=m.book_title.length>7?m.book_title.slice(0,7)+'…':m.book_title;
  const cover=m.book_cover
    ?`<img src="${esc(m.book_cover)}" class="tbl-cover" onerror="this.style.background='#e8e0d0';this.removeAttribute('src')">`
    :`<div class="tbl-cover"></div>`;
  return `<div class="tbl-book">${cover}<span class="tbl-book-title">${esc(short)}</span></div>`;
}

/* ── 좌석 셀 HTML ── */
function makeSeatCell(m){
  const isSelf=myUserId&&m.user_id===myUserId;
  const elapsed=elapsedStr(m.joined_at);
  const tipLines=[m.book_title?`📖 ${esc(m.book_title)}`:'',elapsed].filter(Boolean).join('<br>');
  const tip=tipLines?`<div class="tbl-tip">${tipLines}</div>`:'';

  if(m.is_ghost){
    return `<div class="tbl-cell">
      ${tip}
      <div class="tbl-ghost-ico">👻</div>
      ${makeBookCard(m)}
    </div>`;
  }

  const name=m.display_name||'독자';
  const av=makeAv(name,m.avatar_url,48);
  const badge=isSelf?'<div class="tbl-me">나</div>':'';
  return `<div class="tbl-cell">
    ${tip}
    <div class="tbl-av">${av}${badge}</div>
    <div class="tbl-name">${esc(name)}</div>
    ${makeBookCard(m)}
  </div>`;
}

/* ── 격자 테이블 렌더링 ── */
function render(){
  if(!channel) return;
  const members=Object.values(channel.presenceState()).flat().filter(m=>!m.is_observer);

  const cnt=document.getElementById('lib-count');
  if(cnt) cnt.textContent=`${members.length}명`;

  const main=document.getElementById('lib-main');
  if(!main) return;

  const cols=4;
  // 항상 마지막 2칸은 테이블 면(갈색), 나머지는 좌석
  const rows=Math.max(Math.ceil((members.length+2)/cols),2);
  const total=rows*cols;
  const seatSlots=total-2;

  // 처음 렌더 시 격자 래퍼 생성
  if(!document.getElementById('lib-grid')){
    main.innerHTML=`
      <div class="tbl-wrap">
        <div class="tbl-label">READING TABLE</div>
        <div class="tbl-grid" id="lib-grid"></div>
      </div>`;
  }

  const grid=document.getElementById('lib-grid');
  if(!grid) return;

  let html='';
  for(let i=0;i<total;i++){
    if(i<members.length)        html+=makeSeatCell(members[i]);
    else if(i<seatSlots)        html+='<div class="tbl-empty"></div>';
    else                        html+='<div class="tbl-surface"></div>';
  }
  grid.innerHTML=html;
}

/* ── 나가기 ── */
async function leaveLibrary(){
  saveTime();
  clearInterval(clockTick);
  clearInterval(renderTick);
  if(channel){
    try{await channel.untrack();}catch(e){}
    try{await channel.unsubscribe();}catch(e){}
    channel=null;
  }
  const isInlineMode=localStorage.getItem('bl_lib_from_app')&&!(window.opener&&window.opener!==window);
  localStorage.removeItem('bl_lib_from_app');
  if(isInlineMode){
    location.href='index.html';
  } else {
    try{window.close();}catch(e){}
    setTimeout(()=>{
      const m=document.getElementById('lib-main');
      if(m) m.innerHTML='<div class="empty"><div class="empty-icon">👋</div><div class="empty-txt">독서 시간이 저장됐어요.<br>이 창을 닫아주세요.</div></div>';
    },300);
  }
}

/* ── 시간 저장 ── */
function saveTime(){
  if(!joinedAt||!params.bookId) return;
  const mins=Math.round((Date.now()-joinedAt)/60000);
  if(mins<1) return;
  localStorage.setItem('bl_lib_session_done',JSON.stringify({
    bookId:params.bookId,
    minutes:mins,
    date:new Date().toISOString().slice(0,10)
  }));
}

/* ── 초기화 ── */
async function init(){
  console.log('[library] v1.0.5 init');
  startClock();
  const isInline=localStorage.getItem('bl_lib_from_app')&&!(window.opener&&window.opener!==window);
  if(isInline){
    const btn=document.getElementById('btn-leave');
    if(btn) btn.textContent='← 앱으로';
  }
  try{
    const raw=localStorage.getItem('bl_lib_params');
    if(raw){params=JSON.parse(raw);localStorage.removeItem('bl_lib_params');}
  }catch(e){params={};}
  console.log('[library] params:',JSON.stringify(params));

  let session=null;
  try{
    const{data}=await Promise.race([
      sb.auth.getSession(),
      new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),5000))
    ]);
    session=data?.session;
  }catch(e){}

  if(!session?.user){
    console.warn('[library] no session');
    document.getElementById('lib-main').innerHTML=`<div class="empty"><div class="empty-icon">🔒</div><div class="empty-txt">로그인이 필요해요.<br>북로그에서 로그인 후 다시 시도해주세요.</div></div>`;
    return;
  }
  console.log('[library] session ok, uid:', session.user.id);

  joinedAt=Date.now();
  myUserId=session.user.id;
  channel=sb.channel('bl_library',{config:{presence:{key:myUserId}}});

  const payload=params.isGhost
    ?{is_ghost:true,is_observer:false,
      book_title:params.bookTitle||null,book_cover:params.bookCover||null,
      user_id:myUserId,joined_at:joinedAt}
    :{is_ghost:false,is_observer:false,
      display_name:params.displayName||'독자',
      avatar_url:params.avatarUrl||null,
      book_title:params.bookTitle||null,book_cover:params.bookCover||null,
      user_id:myUserId,joined_at:joinedAt};

  async function doTrack(){
    for(let i=0;i<3;i++){
      try{
        const st=await channel.track(payload);
        console.log('[library] track attempt',i+1,'→',st);
        if(st==='ok') return true;
      }catch(e){ console.error('[library] track error',e); }
      await new Promise(r=>setTimeout(r,1200));
    }
    console.error('[library] track failed after 3 attempts');
    return false;
  }

  channel
    .on('presence',{event:'sync'},()=>{console.log('[library] sync',channel.presenceState());render();})
    .on('presence',{event:'join'},()=>{console.log('[library] join',channel.presenceState());render();})
    .on('presence',{event:'leave'},()=>{console.log('[library] leave',channel.presenceState());render();})
    .subscribe(async status=>{
      console.log('[library] channel status:',status);
      if(status==='SUBSCRIBED'){
        document.querySelector('.loading')?.remove();
        render();
        const ok=await doTrack();
        if(ok){
          render();
          setTimeout(render,800);
        } else {
          const main=document.getElementById('lib-main');
          if(main) main.innerHTML=`<div class="empty"><div class="empty-icon">📡</div><div class="empty-txt">Presence 연결 실패.<br>새로고침 후 다시 시도해주세요.</div></div>`;
        }
        renderTick=setInterval(render,60000);
      } else if(status==='CHANNEL_ERROR'||status==='TIMED_OUT'){
        document.getElementById('lib-main').innerHTML=`<div class="empty"><div class="empty-icon">📡</div><div class="empty-txt">연결에 실패했어요.<br>잠시 후 다시 시도해주세요.</div></div>`;
      }
    });
}

window.addEventListener('beforeunload',()=>{saveTime();});
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
