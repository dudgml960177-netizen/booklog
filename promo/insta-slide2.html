<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=DM+Serif+Display:ital@0;1&family=Lato:wght@300;400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Noto Serif KR', serif;
    background: #2a1e0e;
  }

  .slide {
    width: 1080px;
    height: 1080px;
    background: #2a1e0e;
    position: relative;
    display: flex;
    flex-direction: column;
    padding: 70px 72px;
    overflow: hidden;
  }

  /* 배경 장식 */
  .bg-glow {
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(196,113,74,.18) 0%, transparent 65%);
    top: -80px; right: -80px;
  }
  .bg-glow2 {
    position: absolute;
    width: 350px; height: 350px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(196,113,74,.10) 0%, transparent 65%);
    bottom: 100px; left: -60px;
  }

  /* 헤더 */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 54px;
    position: relative; z-index: 2;
  }
  .header-logo {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 30px;
    color: #f5ede0;
  }
  .header-tag {
    font-family: 'Lato', sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #c4714a;
    border: 1px solid #c4714a;
    border-radius: 4px;
    padding: 5px 14px;
  }

  /* 타이틀 */
  .section-title {
    font-size: 42px;
    font-weight: 700;
    color: #f5ede0;
    line-height: 1.25;
    margin-bottom: 52px;
    position: relative; z-index: 2;
  }
  .section-title em {
    color: #c4714a;
    font-style: normal;
  }

  /* 기능 카드 그리드 */
  .feature-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    position: relative; z-index: 2;
    flex: 1;
  }
  .feature-card {
    background: rgba(245, 237, 224, .06);
    border: 1px solid rgba(245, 237, 224, .12);
    border-radius: 20px;
    padding: 32px 30px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: all .2s;
  }
  .feature-card.highlight {
    background: rgba(196, 113, 74, .15);
    border-color: rgba(196, 113, 74, .4);
  }
  .feature-icon {
    font-size: 38px;
    line-height: 1;
  }
  .feature-name {
    font-size: 22px;
    font-weight: 700;
    color: #f5ede0;
    letter-spacing: -.3px;
  }
  .feature-desc {
    font-size: 14.5px;
    color: #c8b090;
    line-height: 1.65;
  }
  .feature-badge {
    display: inline-block;
    background: #c4714a;
    color: #fff;
    font-size: 11px;
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border-radius: 4px;
    padding: 3px 10px;
    width: fit-content;
  }

  /* 하단 */
  .bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 28px;
    position: relative; z-index: 2;
  }
  .bottom-url {
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    color: #7a6040;
    letter-spacing: .5px;
  }
  .slide-num {
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    color: #6a5030;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="bg-glow"></div>
  <div class="bg-glow2"></div>

  <div class="header">
    <div class="header-logo">Bok Log</div>
    <div class="header-tag">Features</div>
  </div>

  <div class="section-title">
    독서를 더 깊이,<br>
    <em>스마트하게 즐기는 법</em>
  </div>

  <div class="feature-grid">
    <div class="feature-card highlight">
      <div class="feature-icon">⏱</div>
      <div class="feature-name">독서 타이머</div>
      <div class="feature-desc">읽기 시작하면 타이머 ON. 오늘 몇 분 읽었는지 자동으로 기록돼요.</div>
      <div class="feature-badge">New</div>
    </div>

    <div class="feature-card">
      <div class="feature-icon">✍️</div>
      <div class="feature-name">문장 수첩</div>
      <div class="feature-desc">마음에 드는 문장을 저장하고 형광펜으로 표시. 나만의 독서 노트.</div>
    </div>

    <div class="feature-card">
      <div class="feature-icon">📊</div>
      <div class="feature-name">독서 통계</div>
      <div class="feature-desc">월간 독서량, 최장 연속 독서일, 별점 분포를 한눈에 확인.</div>
    </div>

    <div class="feature-card">
      <div class="feature-icon">📤</div>
      <div class="feature-name">달력 공유</div>
      <div class="feature-desc">이달의 독서 달력을 이미지로 저장해서 SNS에 공유해보세요.</div>
    </div>
  </div>

  <div class="bottom">
    <div class="bottom-url">boklog-neon.vercel.app</div>
    <div class="slide-num">02 / 03</div>
  </div>
</div>
</body>
</html>
