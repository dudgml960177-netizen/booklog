<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>도서관 · 북로그</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    :root{
      --bg:#ede4d2;
      --paper:#fdf8f2;
      --paper2:#f7f0e3;
      --tbl:#b4956c;
      --tbl2:#c8ae88;
      --border:#ddd0b4;
      --border2:#c8b89a;
      --tx1:#2a1c0c;
      --tx2:#58381a;
      --tx3:#9a8268;
      --acc:#c47028;
      --acc2:#a05820;
      --ff:'Pretendard','Apple SD Gothic Neo',sans-serif;
      --fs:'DM Serif Display',serif;
    }
    html{min-height:100%;}
    body{
      min-height:100vh;display:flex;flex-direction:column;
      font-family:var(--ff);color:var(--tx1);
      background:var(--bg);
      background-image:
        radial-gradient(ellipse 80% 60% at 15% 90%,rgba(180,110,40,.13) 0%,transparent 55%),
        radial-gradient(ellipse 55% 45% at 85% 8%,rgba(210,170,90,.09) 0%,transparent 50%);
    }

    /* ── 헤더 ── */
    .hd{
      background:rgba(253,248,242,.95);backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
      padding:.5rem 1.1rem;
      display:flex;align-items:center;justify-content:space-between;gap:.5rem;
      position:sticky;top:0;z-index:30;flex-shrink:0;
    }
    .hd-left{display:flex;align-items:center;gap:.5rem;}
    .hd-logo{font-family:var(--fs);font-size:1.05rem;font-style:italic;color:var(--tx1);white-space:nowrap;letter-spacing:.01em;}
    .hd-sep{color:var(--border2);font-size:.75rem;}
    .hd-room{font-size:.66rem;font-weight:600;color:var(--tx2);letter-spacing:.05em;text-transform:uppercase;}
    .hd-count{
      background:var(--acc);color:#fff;
      font-size:.58rem;font-weight:700;letter-spacing:.04em;
      padding:.1rem .46rem;border-radius:20px;white-space:nowrap;
      box-shadow:0 1px 6px rgba(196,112,40,.35);
    }
    .hd-right{display:flex;align-items:center;gap:.6rem;flex-shrink:0;}
    .hd-times{text-align:right;line-height:1.5;}
    .hd-clock{font-size:.68rem;font-weight:600;color:var(--tx2);font-variant-numeric:tabular-nums;letter-spacing:.04em;}
    .hd-elapsed{font-size:.56rem;color:var(--acc);font-weight:600;font-variant-numeric:tabular-nums;}
    .btn-leave,.btn-rest{
      font-size:.66rem;padding:.28rem .7rem;
      background:#fdf8f2;color:var(--tx2);
      border:1.5px solid rgba(42,28,12,.35);border-radius:999px;
      cursor:pointer;font-family:var(--ff);white-space:nowrap;
      transition:background .15s,color .15s,border-color .15s;
    }
    .btn-leave:hover{background:#2a1c0c;color:#fdf8f2;border-color:#2a1c0c;}
    .btn-rest:hover{background:#f0e6d2;border-color:rgba(42,28,12,.5);}
    .btn-rest.on{background:#c47028;color:#fff;border-color:#2a1c0c;}

    /* ── 메인 ── */
    .main{flex:1;padding:1.1rem .8rem 2.5rem;display:flex;flex-direction:column;align-items:center;}

    /* ── 테이블 영역 ── */
    .tbl-wrap{width:min(540px,95vw);}

    /* READING TABLE 레이블 */
    .tbl-label-row{
      display:flex;align-items:center;gap:.75rem;
      margin-bottom:.65rem;
    }
    .tbl-label-line{
      flex:1;height:1px;
      background:linear-gradient(to right,transparent,var(--border2),transparent);
    }
    .tbl-label-txt{
      font-family:var(--fs);font-style:italic;
      font-size:.72rem;color:var(--tx3);
      white-space:nowrap;letter-spacing:.03em;
    }

    /* ── 격자 테이블 ── */
    .tbl-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:1.5px;
      background:rgba(42,28,12,.4);   /* 얇은 검은 격자선 */
      border:1.5px solid #2a1c0c;     /* 얇은 검은 테두리 */
      border-radius:14px;
      overflow:visible; /* 생각 말풍선이 셀 위로 튀어나올 수 있도록 */
      box-shadow:3px 4px 0 rgba(42,28,12,.12);
    }
    /* overflow:visible 대응 — 모서리 셀에 직접 라운딩 */
    .tbl-grid>*:first-child     {border-radius:15px 0 0 0;}
    .tbl-grid>*:nth-child(4)    {border-radius:0 15px 0 0;}
    .tbl-grid>*:nth-last-child(4){border-radius:0 0 0 15px;}
    .tbl-grid>*:last-child      {border-radius:0 0 15px 0;}

    /* 일반 좌석 */
    .tbl-cell{
      background:var(--paper);
      min-height:126px;
      padding:.65rem .4rem .5rem;
      display:flex;flex-direction:column;align-items:center;gap:.3rem;
      position:relative;cursor:default;
      transition:background .13s;
    }
    .tbl-cell:hover{background:#f4eee3;}

    /* 빈 좌석 */
    .tbl-empty{
      background:var(--paper2);
      min-height:126px;
    }

    /* 테이블 표면 — 빈 칸과 동일하게 표시 */
    .tbl-surface{
      background:var(--paper2);
      min-height:126px;
    }

    /* 아바타 래퍼 */
    .tbl-av{position:relative;flex-shrink:0;}

    /* "나" 배지 */
    .tbl-me{
      position:absolute;top:-4px;right:-4px;
      width:17px;height:17px;
      background:var(--acc);color:#fff;
      border-radius:50%;border:1.5px solid var(--paper);
      font-size:.44rem;font-weight:800;
      display:flex;align-items:center;justify-content:center;
      z-index:2;
      box-shadow:0 1px 5px rgba(196,112,40,.45);
    }

    /* 휴식 중 간판 */
    .tbl-rest{
      position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);
      background:#f5f0e8;border:1px solid var(--border2);border-radius:8px;
      padding:.06rem .3rem;font-size:.54rem;color:var(--tx3);
      white-space:nowrap;z-index:3;
      box-shadow:0 1px 4px rgba(30,15,0,.1);
      letter-spacing:.01em;
    }

    /* 이름 */
    .tbl-name{
      font-size:.62rem;font-weight:600;color:var(--tx1);
      text-align:center;width:100%;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      padding:0 .1rem;
    }

    /* 책 카드 */
    .tbl-book{
      display:flex;align-items:center;gap:.28rem;
      background:rgba(255,255,255,.75);
      border:1px solid var(--border);border-radius:5px;
      padding:.2rem .3rem;width:100%;overflow:hidden;
      margin-top:auto;flex-shrink:0;
    }
    .tbl-cover{
      width:20px;height:28px;border-radius:2px;
      object-fit:cover;flex-shrink:0;
      background:linear-gradient(135deg,#c0956a,#7a4820);
      display:block;
    }
    .tbl-book-title{
      font-size:.52rem;color:var(--tx2);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      line-height:1.35;
    }

    /* 유령 */
    .tbl-ghost-ico{font-size:2.1rem;line-height:1;margin-top:.15rem;filter:drop-shadow(0 1px 4px rgba(0,0,0,.1));}

    /* ── 생각 말풍선 ── */
    .tbl-bubble{
      display:none;
      position:absolute;
      /* 기본: 셀 아래에 표시 */
      top:calc(100% + 10px);bottom:auto;
      left:50%;transform:translateX(-50%);
      background:var(--paper);
      border:1.5px solid var(--border2);
      border-radius:18px;
      padding:.6rem .7rem;
      flex-direction:row;align-items:flex-start;gap:.55rem;
      z-index:300;pointer-events:none;
      box-shadow:0 6px 28px rgba(30,15,0,.18),inset 0 1px 0 rgba(255,255,255,.9);
      min-width:148px;max-width:215px;
    }
    .tbl-cell:hover .tbl-bubble{display:flex;}

    /* 꼬리 점: 버블 위쪽(셀과 연결) */
    .tbl-bubble::before{
      content:'';
      position:absolute;top:-13px;bottom:auto;left:50%;transform:translateX(-50%);
      width:10px;height:10px;
      background:var(--paper);border:1.5px solid var(--border2);
      border-radius:50%;
      box-shadow:0 1px 5px rgba(30,15,0,.1);
    }
    .tbl-bubble::after{
      content:'';
      position:absolute;top:-22px;bottom:auto;left:calc(50% - 7px);transform:translateX(-50%);
      width:7px;height:7px;
      background:var(--paper);border:1.5px solid var(--border2);
      border-radius:50%;
    }

    /* 말풍선 내용 */
    .bubble-cover{
      width:52px;height:72px;
      border-radius:4px;object-fit:cover;flex-shrink:0;
      background:linear-gradient(135deg,#c0956a,#7a4820);
      box-shadow:2px 3px 10px rgba(30,15,0,.22);
    }
    .bubble-info{
      display:flex;flex-direction:column;gap:.16rem;
      flex:1;min-width:0;padding-top:.08rem;
    }
    /* 흘러가는 텍스트 */
    .bmq-wrap{
      overflow:hidden;white-space:nowrap;max-width:118px;
      mask-image:linear-gradient(to right,transparent,#000 6px,#000 calc(100% - 6px),transparent);
      -webkit-mask-image:linear-gradient(to right,transparent,#000 6px,#000 calc(100% - 6px),transparent);
    }
    .bmq-inner{display:inline-block;animation:bmqAnim 6s linear infinite;}
    @keyframes bmqAnim{from{transform:translateX(0)}to{transform:translateX(-50%)}}
    .bubble-author{font-size:.54rem;color:var(--tx3);font-weight:500;}
    .bubble-title{font-size:.62rem;font-weight:700;color:var(--tx1);}
    .bubble-time{
      font-size:.6rem;color:var(--acc);font-weight:700;white-space:nowrap;margin-top:.04rem;
    }
    .bubble-nobook{
      font-size:.58rem;color:var(--tx3);font-style:italic;white-space:nowrap;
    }

    /* ── 로딩 ── */
    .loading{text-align:center;padding:3.5rem 1rem;color:var(--tx3);font-size:.78rem;}
    .spinner{
      width:22px;height:22px;
      border:2px solid var(--border);border-top-color:var(--acc);
      border-radius:50%;animation:spin .8s linear infinite;margin:0 auto .8rem;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── 에러/빈 상태 ── */
    .empty{text-align:center;padding:2.5rem 1rem;color:var(--tx3);}
    .empty-icon{font-size:1.8rem;margin-bottom:.5rem;}
    .empty-txt{font-size:.74rem;line-height:1.8;}
    .empty-btn{
      margin-top:.8rem;padding:.3rem .9rem;
      background:var(--acc);color:#fff;border:none;border-radius:5px;
      font-size:.7rem;font-family:var(--ff);cursor:pointer;
    }
  </style>
</head>
<body>

<div class="hd">
  <div class="hd-left">
    <span class="hd-logo">Booklog</span>
    <span class="hd-sep">·</span>
    <span class="hd-room">도서관</span>
    <span class="hd-count" id="lib-count">0명</span>
  </div>
  <div class="hd-right">
    <div class="hd-times">
      <div class="hd-clock" id="lib-clock">--:--</div>
      <div class="hd-elapsed" id="lib-elapsed"></div>
    </div>
    <button class="btn-rest" id="btn-rest" onclick="toggleRest()">💤 휴식</button>
    <button class="btn-leave" id="btn-leave" onclick="leaveLibrary()">나가기</button>
  </div>
</div>

<div class="main" id="lib-main">
  <div class="loading"><div class="spinner"></div>도서관 입장 중…</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://xowlwzpoxrudgaoavkbr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhvd2x3enBveHJ1ZGdhb2F2a2JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NTgxNjQsImV4cCI6MjA5MjIzNDE2NH0.Dlv8KYcQAieS1jQ9J6zjfsodco2U-m3ObuP5LXJPaVQ';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth:{ persistSession:true, storageKey:'booklog-auth', storage:window.localStorage, autoRefreshToken:true }
});

const ADMIN_ID='191744c3-0cdd-4c15-b08c-6ec82e9ab3f8';
let params={}, channel=null, joinedAt=null, clockTick=null, renderTick=null, myUserId=null;
let localSelf=null;       // 본인 payload (즉시 표시용)
let bcMembers={};         // Broadcast 기반 멤버 맵 {user_id → payload}
let myPayload=null;       // 브로드캐스트에 재사용할 payload 참조
let localBc=null;         // BroadcastChannel (같은 기기 탭간 동기화)
let _connectedOnce=false; // 첫 연결 완료 여부 (재연결 vs 초기 실패 구분용)
let isResting=false;      // 휴식 모드 여부
let restStartedAt=null;   // 현재 휴식 시작 시각
let totalRestMs=0;        // 누적 휴식 밀리초

/* ── 실제 독서 경과 밀리초 ── */
function readingMs(){
  const curRestMs=(isResting&&restStartedAt)?(Date.now()-restStartedAt):0;
  return Math.max(0, Date.now()-joinedAt-totalRestMs-curRestMs);
}

/* ── track 재시도 ── */
async function doTrack(){
  for(let i=0;i<3;i++){
    try{
      const st=await channel.track(myPayload,{timeout:5000});
      if(st==='ok') return true;
    }catch(e){ console.warn('[lib] track error',e); }
    if(i<2) await new Promise(r=>setTimeout(r,1500));
  }
  return false;
}

/* ── 시계 ── */
function startClock() {
  function tick() {
    const n=new Date(), pad=v=>String(v).padStart(2,'0');
    const cl=document.getElementById('lib-clock');
    if(cl) cl.textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}`;
    const el=document.getElementById('lib-elapsed');
    if(el&&joinedAt){
      if(isResting){
        el.textContent='💤 휴식 중';
      } else {
        const s=Math.floor(readingMs()/1000);
        const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;
        el.textContent=h>0?`${h}h ${m}m 독서`:m>0?`${m}m ${sc}s 독서`:`${sc}s 독서`;
      }
    }
  }
  tick();
  clockTick=setInterval(tick,1000);
}

/* ── 잔류 시간 문자열 ── */
function elapsedStr(ts) {
  if(!ts) return '';
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<60) return '방금 입장';
  const m=Math.floor(s/60),h=Math.floor(m/60);
  return h>0?`${h}시간 ${m%60}분 독서 중`:`${m}분 독서 중`;
}

/* ── HTML 이스케이프 ── */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ── 아바타 onerror 핸들러 (이중 따옴표 충돌 방지용 전역 함수) ── */
function avErr(img){
  const init=img.dataset.init||'?';
  const bg=img.dataset.bg||'#888';
  const sz=Number(img.dataset.sz)||40;
  img.outerHTML=`<div style="width:${sz}px;height:${sz}px;border-radius:50%;border:2px solid #ddd0b4;box-shadow:0 2px 8px rgba(30,15,0,.14);background:${bg};display:flex;align-items:center;justify-content:center;font-size:${Math.round(sz*.38)}px;font-weight:700;color:#fff;">${init}</div>`;
}

/* ── 아바타 HTML ── */
function makeAv(name,url,size){
  const initial=(name||'독').slice(0,1).toUpperCase();
  const pal=['#b07030','#6b8f6b','#5a7a8a','#8b6b8b','#c4714a','#7a5a3a'];
  const bg=pal[(name||'독').charCodeAt(0)%pal.length];
  const base=`width:${size}px;height:${size}px;border-radius:50%;border:2px solid #ddd0b4;box-shadow:0 2px 8px rgba(30,15,0,.14);object-fit:cover;display:block;`;
  if(!url) return `<div style="${base}background:${bg};display:flex;align-items:center;justify-content:center;font-size:${Math.round(size*.38)}px;font-weight:700;color:#fff;">${initial}</div>`;
  return `<img src="${esc(url)}" style="${base}" data-init="${initial}" data-bg="${bg}" data-sz="${size}" onerror="avErr(this)">`;
}

/* ── 책 카드 ── */
function makeBookCard(m){
  if(!m.book_title) return '';
  const short=m.book_title.length>8?m.book_title.slice(0,7)+'…':m.book_title;
  const cover=m.book_cover
    ?`<img src="${esc(m.book_cover)}" class="tbl-cover" onerror="this.className='tbl-cover';this.removeAttribute('src')">`
    :`<div class="tbl-cover"></div>`;
  return `<div class="tbl-book">${cover}<span class="tbl-book-title">${esc(short)}</span></div>`;
}

/* ── 흘러가는 텍스트 (긴 경우 마퀴 루프) ── */
function makeMarqueeTxt(text,cls){
  if(!text) return '';
  const t=esc(text);
  if(text.length<=13) return `<div class="${cls}">${t}</div>`;
  const sep='&nbsp;&nbsp;·&nbsp;&nbsp;';
  return `<div class="bmq-wrap"><span class="bmq-inner ${cls}">${t}${sep}${t}${sep}</span></div>`;
}

/* ── 생각 말풍선 ── */
function makeBubble(m){
  const elapsed=elapsedStr(m.joined_at);
  const coverEl=m.book_cover
    ?`<img src="${esc(m.book_cover)}" class="bubble-cover" onerror="this.className='bubble-cover';this.removeAttribute('src')">`
    :`<div class="bubble-cover"></div>`;
  let info='';
  if(m.book_title){
    if(m.book_author) info+=makeMarqueeTxt(m.book_author,'bubble-author');
    info+=makeMarqueeTxt(m.book_title,'bubble-title');
  } else {
    info+=`<div class="bubble-nobook">읽는 책 미설정</div>`;
  }
  if(m.is_resting){
    info+=`<div class="bubble-time">💤 휴식 중</div>`;
  } else if(elapsed){
    info+=`<div class="bubble-time">⏱ ${elapsed}</div>`;
  }
  return `<div class="tbl-bubble">${coverEl}<div class="bubble-info">${info}</div></div>`;
}

/* ── 좌석 셀 HTML ── */
function makeSeatCell(m){
  const isSelf=myUserId&&m.user_id===myUserId;
  const bubble=makeBubble(m);

  if(m.is_ghost){
    const badge=isSelf?'<div class="tbl-me">나</div>':'';
    const ghostKickBtn=(myUserId===ADMIN_ID&&!isSelf)
      ?`<button onclick="event.stopPropagation();kickMember('${m.user_id}')" title="퇴장" style="position:absolute;top:4px;right:4px;z-index:6;font-size:.5rem;padding:.06rem .32rem;border:1px solid #d08070;border-radius:7px;background:rgba(253,248,242,.92);color:#c0392b;cursor:pointer;line-height:1.4;">퇴장</button>`
      :'';
    return `<div class="tbl-cell">
      ${bubble}
      <div class="tbl-av" style="position:relative;">
        <div class="tbl-ghost-ico">👻</div>${badge}
      </div>
      <div class="tbl-name">도서관 유령</div>
      ${makeBookCard(m)}
      ${ghostKickBtn}
    </div>`;
  }

  const rawName=m.display_name||'독자';
  const name=rawName.length>8?rawName.slice(0,7)+'…':rawName;
  const av=makeAv(rawName,m.avatar_url,50);
  const badge=isSelf?'<div class="tbl-me">나</div>':'';
  const restBadge=m.is_resting?'<div class="tbl-rest">💤 휴식 중</div>':'';
  const avStyle=m.is_resting?' style="filter:grayscale(1);opacity:.6;transition:filter .25s,opacity .25s;"':'';
  const kickBtn=(myUserId===ADMIN_ID&&!isSelf)
    ?`<button onclick="event.stopPropagation();kickMember('${m.user_id}')" title="퇴장" style="position:absolute;top:4px;right:4px;z-index:6;font-size:.5rem;padding:.06rem .32rem;border:1px solid #d08070;border-radius:7px;background:rgba(253,248,242,.92);color:#c0392b;cursor:pointer;line-height:1.4;">퇴장</button>`
    :'';
  return `<div class="tbl-cell">
    ${bubble}
    <div class="tbl-av"${avStyle}>${av}${badge}${restBadge}</div>
    <div class="tbl-name">${esc(name)}</div>
    ${makeBookCard(m)}
    ${kickBtn}
  </div>`;
}

function kickMember(uid){
  if(!confirm('이 멤버를 도서관에서 퇴장시킬까요?')) return;
  sendBc('bl_kick',{user_id:myUserId, target_id:uid});
}

/* ── 현재 멤버 목록 ── */
function getMembers(){
  let list=[];
  if(channel){
    try{
      list=Object.values(channel.presenceState()||{}).flat().filter(m=>!m.is_observer);
    }catch(e){ console.error('[lib] presenceState error',e); }
  }
  /* presence 멤버에 broadcast 최신 상태 덮어쓰기 (is_resting 등 sync 지연 보완) */
  /* 본인은 항상 localSelf로 재정의 (presence 반영 지연 방지) */
  list=list.map(m=>{
    if(m.user_id===myUserId && localSelf) return {...m,...localSelf};
    const bc=bcMembers[m.user_id]; return bc?{...m,...bc}:m;
  });
  /* Broadcast로 받은 멤버 중 presence에 없는 사람 추가 */
  const presIds=new Set(list.map(m=>m.user_id));
  Object.values(bcMembers).forEach(m=>{ if(!presIds.has(m.user_id)) list.push(m); });
  /* 본인이 아직 없으면 localSelf로 보완 */
  if(localSelf && !list.some(m=>m.user_id===myUserId)){
    list=[localSelf,...list];
  }
  return list;
}

/* ── 격자 렌더 ── */
let _renderRaf=null, _renderHash='';

function render(){
  if(_renderRaf) return;          // 이미 큐에 있으면 무시
  _renderRaf=requestAnimationFrame(()=>{
    _renderRaf=null;
    _doRender();
  });
}

function _doRender(){
  const members=getMembers();

  const cnt=document.getElementById('lib-count');
  if(cnt) cnt.textContent=`${members.length}명`;

  const grid=document.getElementById('lib-grid');
  if(!grid) return;

  // 멤버 구성이 바뀌지 않으면 DOM 갱신 생략
  const hash=members.map(m=>
    `${m.user_id}|${m.is_ghost?1:0}|${m.is_resting?1:0}|${m.display_name||''}|${m.book_title||''}|${m.book_cover||''}`
  ).join(';');
  if(hash===_renderHash) return;
  _renderHash=hash;

  const cols=4;
  const rows=Math.max(Math.ceil((members.length+2)/cols),2);
  const total=rows*cols;
  const seatSlots=total-2;

  let html='';
  for(let i=0;i<total;i++){
    if(i<members.length)   html+=makeSeatCell(members[i]);
    else if(i<seatSlots)   html+='<div class="tbl-empty"></div>';
    else                   html+='<div class="tbl-surface"></div>';
  }
  grid.innerHTML=html;
}

/* ── 그리드 컨테이너 생성 ── */
function initGrid(){
  const main=document.getElementById('lib-main');
  if(!main||document.getElementById('lib-grid')) return;
  main.innerHTML=`
    <div class="tbl-wrap">
      <div class="tbl-label-row">
        <div class="tbl-label-line"></div>
        <div class="tbl-label-txt">Reading Table</div>
        <div class="tbl-label-line"></div>
      </div>
      <div class="tbl-grid" id="lib-grid"></div>
    </div>`;
}

/* ── Broadcast 이벤트 통합 핸들러 ── */
function handleBcMsg(event,p){
  if(!p?.user_id||p.user_id===myUserId) return;
  if(event==='bl_join'||event==='bl_heartbeat'){
    bcMembers[p.user_id]={...p,_seen:Date.now()};
    render();
    if(event==='bl_join') sendBc('bl_heartbeat',myPayload);  // 새 입장자에게 내 상태 응답
  } else if(event==='bl_hello'){
    sendBc('bl_heartbeat',myPayload);
  } else if(event==='bl_leave'){
    delete bcMembers[p.user_id];
    render();
  } else if(event==='bl_kick'){
    if(p.target_id===myUserId){
      alert('관리자에 의해 도서관에서 퇴장 처리되었습니다.');
      sendBc('bl_leave',{user_id:myUserId});
      location.replace('index.html');
    }
  }
}

/* ── Broadcast 전송 (같은 기기 + Supabase 동시) ── */
function sendBc(event,payload){
  try{ localBc?.postMessage({event,payload}); }catch(e){}
  if(channel){
    channel.send({type:'broadcast',event,payload})
      .then(r=>{ if(r!=='ok'&&r!==undefined) console.warn('[lib] bc send',event,'→',r); })
      .catch(e=>console.error('[lib] bc error',event,e));
  }
}

/* ── 휴식 토글 ── */
async function toggleRest(){
  isResting=!isResting;
  if(isResting){
    restStartedAt=Date.now();
  } else {
    if(restStartedAt) totalRestMs+=Date.now()-restStartedAt;
    restStartedAt=null;
  }
  myPayload={...myPayload,is_resting:isResting};
  localSelf=myPayload;

  const btn=document.getElementById('btn-rest');
  if(btn){
    btn.textContent=isResting?'📖 독서 재개':'💤 휴식';
    btn.classList.toggle('on',isResting);
  }

  _renderHash='';
  render();
  if(channel&&_connectedOnce){
    await doTrack();
    sendBc('bl_heartbeat',myPayload);
  }
}

/* ── 나가기 ── */
async function leaveLibrary(){
  sendBc('bl_leave',{user_id:myUserId});
  try{ localBc?.close(); localBc=null; }catch(e){}
  saveTime();
  clearInterval(clockTick);
  clearInterval(renderTick);
  if(channel){
    const ch=channel;
    channel=null;
    try{ch.untrack();}catch(e){}      // fire-and-forget (await 하면 네트워크 불량 시 hang)
    try{ch.unsubscribe();}catch(e){}
  }
  const isInline=localStorage.getItem('bl_lib_from_app')&&!(window.opener&&window.opener!==window);
  localStorage.removeItem('bl_lib_from_app');
  if(isInline){
    location.href='index.html';
  } else {
    try{window.close();}catch(e){}
    // Fallback: 모바일 새 탭 등 window.close()가 작동하지 않을 때
    setTimeout(()=>{
      if(!window.closed) location.href='index.html';
    },400);
  }
}

/* ── 시간 저장 (실제 독서 시간만) ── */
function saveTime(){
  if(!joinedAt||!params.bookId) return;
  const mins=Math.round(readingMs()/60000);
  joinedAt=null; // beforeunload 중복 저장 방지
  if(mins<1) return;
  // 로컬 날짜 기준 (UTC 쓰면 자정 이후 이전 날짜로 기록됨)
  const d=new Date();
  const today=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  localStorage.setItem('bl_lib_session_done',JSON.stringify({
    bookId:params.bookId,minutes:mins,date:today
  }));
}

/* ── 초기화 ── */
async function init(){
  console.log('[lib] v1.2.0 init');
  startClock();

  const isInline=localStorage.getItem('bl_lib_from_app')&&!(window.opener&&window.opener!==window);
  if(isInline){
    const btn=document.getElementById('btn-leave');
    if(btn) btn.textContent='← 앱으로';
  }

  try{
    const raw=localStorage.getItem('bl_lib_params');
    if(raw){
      params=JSON.parse(raw);
      localStorage.removeItem('bl_lib_params');
      sessionStorage.setItem('bl_lib_session',raw); // 새로고침 시에도 유지
    } else {
      const sess=sessionStorage.getItem('bl_lib_session');
      if(sess) params=JSON.parse(sess);
    }
  }catch(e){ params={}; }
  console.log('[lib] params:', JSON.stringify(params));

  /* 직접 주소 입력으로 들어온 경우 차단 (params 없음) */
  if(!params.displayName && !params.isGhost){
    location.replace('index.html');
    return;
  }

  /* ── 세션 가져오기 ── */
  let session=null;
  try{
    const{data}=await Promise.race([
      sb.auth.getSession(),
      new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),6000))
    ]);
    session=data?.session;
    /* 세션이 있지만 토큰이 만료됐을 수 있으면 refresh */
    if(session){
      const exp=session.expires_at??0;
      if(exp-Math.floor(Date.now()/1000)<60){
        const{data:r}=await sb.auth.refreshSession();
        if(r?.session) session=r.session;
      }
    }
  }catch(e){ console.warn('[lib] getSession error',e); }

  if(!session?.user){
    console.warn('[lib] no session → redirect to login');
    location.replace('index.html');
    return;
  }
  console.log('[lib] session ok, uid:', session.user.id);

  joinedAt=Date.now();
  myUserId=session.user.id;

  const payload=params.isGhost
    ?{is_ghost:true,is_observer:false,
      display_name:'도서관 유령',
      book_title:params.bookTitle||null,book_cover:params.bookCover||null,book_author:params.bookAuthor||null,
      user_id:myUserId,joined_at:joinedAt}
    :{is_ghost:false,is_observer:false,
      display_name:params.displayName||'독자',
      avatar_url:params.avatarUrl||null,
      book_title:params.bookTitle||null,book_cover:params.bookCover||null,book_author:params.bookAuthor||null,
      user_id:myUserId,joined_at:joinedAt};

  /* presenceState가 늦게 동기화되더라도 본인 프로필은 즉시 표시 */
  localSelf=payload;
  myPayload=payload;

  /* 같은 기기 탭간 BroadcastChannel 초기화 */
  try{
    localBc=new BroadcastChannel('bl_library_v1');
    localBc.onmessage=e=>{ const{event,payload:p}=e.data||{}; if(event) handleBcMsg(event,p); };
    console.log('[lib] BroadcastChannel ok');
  }catch(e){ console.warn('[lib] BroadcastChannel unavailable'); }

  /* loading 제거 후 그리드 생성, localSelf로 즉시 렌더 */
  document.querySelector('.loading')?.remove();
  initGrid();
  render();

  channel=sb.channel('bl_library',{
    config:{
      presence:{key:myUserId},
      broadcast:{self:false}
    }
  });

  channel
    .on('presence',{event:'sync'}, ()=>{ render(); })
    .on('presence',{event:'join'}, ()=>{ render(); })
    .on('presence',{event:'leave'},()=>{ render(); })
    .on('broadcast',{event:'bl_join'},      ({payload:p})=>handleBcMsg('bl_join',p))
    .on('broadcast',{event:'bl_heartbeat'}, ({payload:p})=>handleBcMsg('bl_heartbeat',p))
    .on('broadcast',{event:'bl_hello'},     ()=>{ if(myPayload) sendBc('bl_heartbeat',myPayload); })
    .on('broadcast',{event:'bl_leave'},     ({payload:p})=>handleBcMsg('bl_leave',p))
    .on('broadcast',{event:'bl_kick'},      ({payload:p})=>handleBcMsg('bl_kick',p))
    .subscribe(async status=>{
      console.log('[lib] channel status:',status);

      if(status==='SUBSCRIBED'){
        const ok=await doTrack();

        if(!_connectedOnce){
          /* 최초 연결 */
          if(!ok){
            document.getElementById('lib-main').innerHTML=`<div class="empty">
              <div class="empty-icon">📡</div>
              <div class="empty-txt">연결에 실패했어요.<br>네트워크를 확인하고 다시 시도해주세요.</div>
              <button class="empty-btn" onclick="location.reload()">새로고침</button>
            </div>`;
            return;
          }
          _connectedOnce=true;
          render();
          sendBc('bl_join', myPayload);
          setTimeout(()=>sendBc('bl_hello', {user_id:myUserId}), 500);

          /* 15초마다: 잔류시간 갱신 + 하트비트 + 오래된 멤버 정리 */
          renderTick=setInterval(()=>{
            sendBc('bl_heartbeat', myPayload);
            const cutoff=Date.now()-5*60*1000;
            Object.keys(bcMembers).forEach(uid=>{ if((bcMembers[uid]._seen||0)<cutoff) delete bcMembers[uid]; });
            _renderHash='';
            render();
          },15000);

        } else {
          /* 재연결 (화면 복귀·네트워크 복구 후) — UI는 그대로 유지 */
          if(ok){
            _renderHash='';
            render();
            sendBc('bl_join', myPayload);
            // bl_hello → 기존 멤버들이 heartbeat로 응답 → 재연결 후 멤버 목록 복원
            setTimeout(()=>sendBc('bl_hello',{user_id:myUserId}), 800);
          }
        }

      } else if(status==='CHANNEL_ERROR'||status==='TIMED_OUT'){
        console.warn('[lib] channel issue:',status);
        if(!_connectedOnce){
          /* 아직 한 번도 연결 못 했으면 에러 화면 표시 */
          document.getElementById('lib-main').innerHTML=`<div class="empty">
            <div class="empty-icon">📡</div>
            <div class="empty-txt">연결에 실패했어요.<br>잠시 후 다시 시도해주세요.</div>
            <button class="empty-btn" onclick="location.reload()">새로고침</button>
          </div>`;
        }
        /* 이미 입장했던 경우엔 Supabase 내부 재연결 대기 — UI 유지 */
      }
    });
}

/* ── 화면 복귀 시 presence 재등록 (모바일 잠금 해제) ── */
document.addEventListener('visibilitychange', async ()=>{
  if(document.hidden || !_connectedOnce || !myPayload || !channel) return;
  try{
    const st=await channel.track(myPayload,{timeout:5000});
    if(st==='ok'){
      sendBc('bl_join', myPayload);
      setTimeout(()=>sendBc('bl_hello',{user_id:myUserId}), 600);
      _renderHash='';
      render();
    }
  }catch(e){ console.warn('[lib] re-track on wake failed',e); }
});

/* ── 네트워크 복구 시 재등록 ── */
window.addEventListener('online', async ()=>{
  if(!_connectedOnce || !myPayload || !channel) return;
  try{
    await channel.track(myPayload,{timeout:5000});
    sendBc('bl_join', myPayload);
    setTimeout(()=>sendBc('bl_hello',{user_id:myUserId}), 600);
    _renderHash='';
    render();
  }catch(e){}
});

window.addEventListener('beforeunload',()=>{ saveTime(); });
document.addEventListener('DOMContentLoaded',init);
</script>
