<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>북로그 관리자</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #f2ece0; --card: #faf6ef; --border: #ddd0b8; --border2: #c8bca4;
      --acc: #b07030; --tx1: #2e1f0e; --tx2: #6b4c2a; --tx3: #a08c72;
      --ff: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    }
    body { margin: 0; background: var(--bg); font-family: var(--ff); color: var(--tx1); min-height: 100vh; }
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 1rem;
    }
    .login-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      padding: 2rem 1.8rem; width: 100%; max-width: 320px;
      box-shadow: 0 4px 24px rgba(70,40,10,.09);
    }
    .login-card h2 { margin: 0 0 1.3rem; font-size: 1.1rem; color: var(--tx1); }
    .input {
      width: 100%; padding: .6rem .75rem; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: .88rem; font-family: var(--ff);
      background: var(--bg); color: var(--tx1); outline: none; margin-bottom: .55rem;
    }
    .input:focus { border-color: var(--acc); }
    .btn {
      width: 100%; padding: .6rem; border: none; border-radius: 8px;
      background: var(--acc); color: #fff; font-size: .9rem; font-family: var(--ff);
      font-weight: 600; cursor: pointer; transition: opacity .15s;
    }
    .btn:hover { opacity: .88; }
    .btn:disabled { opacity: .5; cursor: default; }
    .err { font-size: .72rem; color: #b8001f; margin-bottom: .4rem; }

    #admin-screen { display: none; padding: 1.5rem 1rem; max-width: 800px; margin: 0 auto; }
    .admin-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1.3rem;
    }
    .admin-header h1 { margin: 0; font-size: 1.15rem; color: var(--tx1); }
    .btn-sm {
      padding: .3rem .7rem; border: 1px solid var(--border2); border-radius: 6px;
      background: none; font-size: .72rem; font-family: var(--ff);
      color: var(--tx3); cursor: pointer;
    }
    .filter-row { display: flex; gap: .4rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-btn {
      padding: .28rem .7rem; border: 1.5px solid var(--border); border-radius: 20px;
      background: none; font-size: .72rem; font-family: var(--ff);
      color: var(--tx3); cursor: pointer; transition: all .13s;
    }
    .filter-btn.on { border-color: var(--acc); color: var(--acc); background: #fff8f0; font-weight: 600; }
    .stats-row { display: flex; gap: .6rem; margin-bottom: 1.2rem; flex-wrap: wrap; }
    .stat-chip {
      background: var(--card); border: 1px solid var(--border); border-radius: 8px;
      padding: .45rem .8rem; font-size: .72rem; color: var(--tx2);
    }
    .stat-chip b { font-size: .88rem; color: var(--tx1); display: block; }
    table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 10px; overflow: hidden; }
    th {
      padding: .5rem .7rem; font-size: .67rem; letter-spacing: .04em;
      text-transform: uppercase; color: var(--tx3); font-weight: 600;
      background: var(--bg); text-align: left; border-bottom: 1px solid var(--border);
    }
    td { padding: .55rem .7rem; font-size: .78rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fffaf5; }
    .badge {
      display: inline-block; padding: .12rem .45rem; border-radius: 4px;
      font-size: .65rem; font-weight: 600; letter-spacing: .03em;
    }
    .badge-pending { background: #fff3cd; color: #856404; }
    .badge-confirmed { background: #d1e7dd; color: #0a5d2a; }
    .badge-cancelled { background: #f8d7da; color: #842029; }
    .code-cell { font-family: monospace; font-weight: 700; letter-spacing: .08em; color: var(--acc); }
    .btn-confirm {
      padding: .3rem .65rem; border: none; border-radius: 6px;
      background: var(--acc); color: #fff; font-size: .72rem; font-family: var(--ff);
      font-weight: 600; cursor: pointer; white-space: nowrap; transition: opacity .15s;
    }
    .btn-confirm:hover { opacity: .85; }
    .btn-confirm:disabled { opacity: .45; cursor: default; }
    .empty { text-align: center; padding: 2.5rem; font-size: .82rem; color: var(--tx3); }
    .loading { text-align: center; padding: 2rem; font-size: .82rem; color: var(--tx3); }
    .plan-name { font-size: .72rem; color: var(--tx2); }
    .amt { font-weight: 700; color: var(--tx1); }
    @media (max-width: 600px) {
      td, th { padding: .4rem .45rem; }
      th:nth-child(3), td:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>

<!-- 로그인 -->
<div id="login-screen">
  <div class="login-card">
    <h2>북로그 관리자</h2>
    <div id="login-err" class="err" style="display:none;"></div>
    <input type="password" id="admin-pw" class="input" placeholder="관리자 비밀번호"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn" onclick="doLogin()">로그인</button>
  </div>
</div>

<!-- 관리 화면 -->
<div id="admin-screen">
  <div class="admin-header">
    <h1>결제 관리</h1>
    <div style="display:flex;gap:.5rem;align-items:center;">
      <button class="btn-sm" onclick="loadPayments()">새로고침</button>
      <button class="btn-sm" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <div id="stats-row" class="stats-row"></div>

  <div class="filter-row">
    <button class="filter-btn on" data-filter="all" onclick="setFilter('all',this)">전체</button>
    <button class="filter-btn" data-filter="pending" onclick="setFilter('pending',this)">입금 대기</button>
    <button class="filter-btn" data-filter="confirmed" onclick="setFilter('confirmed',this)">확인 완료</button>
    <button class="filter-btn" data-filter="cancelled" onclick="setFilter('cancelled',this)">취소</button>
  </div>

  <div id="table-wrap">
    <div class="loading">불러오는 중…</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://xowlwzpoxrudgaoavkbr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhvd2x3enBveHJ1ZGdhb2F2a2JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NTgxNjQsImV4cCI6MjA5MjIzNDE2NH0.Dlv8KYcQAieS1jQ9J6zjfsodco2U-m3ObuP5LXJPaVQ';

const PLAN_NAMES = {
  plan_a: '가입권 + 초대장 1장',
  plan_b: '가입권 + 초대장 2장',
  plan_c: '가입권 + 초대장 3장',
};

let _secret = '';
let _payments = [];
let _filter = 'all';

function doLogin() {
  const pw = document.getElementById('admin-pw').value.trim();
  if (!pw) return;
  _secret = pw;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-screen').style.display = 'block';
  loadPayments();
}

function doLogout() {
  _secret = '';
  _payments = [];
  document.getElementById('admin-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-pw').value = '';
}

function setFilter(f, el) {
  _filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  renderTable();
}

async function loadPayments() {
  document.getElementById('table-wrap').innerHTML = '<div class="loading">불러오는 중…</div>';
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/admin-payments`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'x-admin-secret': _secret
      },
      body: JSON.stringify({ action: 'list' })
    });
    if (res.status === 401) {
      document.getElementById('login-err').textContent = '비밀번호가 올바르지 않습니다.';
      document.getElementById('login-err').style.display = 'block';
      doLogout(); return;
    }
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'fetch_failed');
    _payments = data.payments || [];
    renderStats();
    renderTable();
  } catch(e) {
    document.getElementById('table-wrap').innerHTML = `<div class="empty">오류: ${e.message}</div>`;
  }
}

function renderStats() {
  const pending = _payments.filter(p => p.status === 'pending').length;
  const confirmed = _payments.filter(p => p.status === 'confirmed').length;
  const totalAmt = _payments.filter(p => p.status === 'confirmed').reduce((s, p) => s + p.amount, 0);
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-chip"><b>${pending}</b>입금 대기</div>
    <div class="stat-chip"><b>${confirmed}</b>확인 완료</div>
    <div class="stat-chip"><b>${totalAmt.toLocaleString()}원</b>총 확인 금액</div>
  `;
}

function renderTable() {
  const list = _filter === 'all' ? _payments : _payments.filter(p => p.status === _filter);
  if (!list.length) {
    document.getElementById('table-wrap').innerHTML = '<div class="empty">내역이 없습니다.</div>';
    return;
  }
  const rows = list.map(p => {
    const date = new Date(p.created_at).toLocaleString('ko-KR', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false });
    const badge = p.status === 'pending'
      ? '<span class="badge badge-pending">입금 대기</span>'
      : p.status === 'confirmed'
        ? '<span class="badge badge-confirmed">확인 완료</span>'
        : '<span class="badge badge-cancelled">취소</span>';
    const confirmBtn = p.status === 'pending'
      ? `<button class="btn-confirm" id="cbtn-${p.id}" onclick="confirmPayment('${p.id}')">✓ 확인</button>`
      : '—';
    return `<tr>
      <td>${date}</td>
      <td>${p.email}</td>
      <td class="plan-name">${PLAN_NAMES[p.plan] || p.plan}</td>
      <td class="amt">${p.amount.toLocaleString()}원</td>
      <td class="code-cell">${p.transfer_code}</td>
      <td>${badge}</td>
      <td>${confirmBtn}</td>
    </tr>`;
  }).join('');

  document.getElementById('table-wrap').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>신청일시</th>
          <th>이메일</th>
          <th>플랜</th>
          <th>금액</th>
          <th>입금코드</th>
          <th>상태</th>
          <th>처리</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

async function confirmPayment(id) {
  const btn = document.getElementById(`cbtn-${id}`);
  if (btn) { btn.disabled = true; btn.textContent = '처리 중…'; }
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/admin-payments`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'x-admin-secret': _secret
      },
      body: JSON.stringify({ action: 'confirm', payment_id: id })
    });
    const data = await res.json();
    if (!res.ok) {
      alert('오류: ' + (data.error || res.status));
      if (btn) { btn.disabled = false; btn.textContent = '✓ 확인'; }
      return;
    }
    // 성공: 목록 새로고침
    await loadPayments();
  } catch(e) {
    alert('네트워크 오류: ' + e.message);
    if (btn) { btn.disabled = false; btn.textContent = '✓ 확인'; }
  }
}
</script>
</body>
</html>
