<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>도서관 · 북로그</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    :root{
      --bg:#f2ece0;--card:#faf6ef;--border:#ddd0b8;--border2:#cfc3ac;
      --tx1:#2e1f0e;--tx2:#5c3d1e;--tx3:#a08c72;
      --acc:#b07030;--acc2:#7a3e18;
      --ff:'Pretendard','Apple SD Gothic Neo',sans-serif;
      --fs:'DM Serif Display',serif;
      --rs:4px;--r:7px;
      --gl:#b0a080;
    }
    html{min-height:100%;background:var(--bg);}
    body{
      min-height:100vh;display:flex;flex-direction:column;
      font-family:var(--ff);color:var(--tx1);
      background:linear-gradient(160deg,#fdf8f0 0%,#ede2cc 100%);
    }

    /* ── 헤더 ── */
    .hd{
      background:rgba(250,246,239,.96);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--border);
      padding:.48rem .9rem;
      display:flex;align-items:center;justify-content:space-between;gap:.5rem;
      position:sticky;top:0;z-index:10;flex-shrink:0;
    }
    .hd-left{display:flex;align-items:center;gap:.45rem;}
    .hd-logo{font-family:var(--fs);font-size:.95rem;color:var(--tx1);white-space:nowrap;}
    .hd-sep{color:var(--border2);font-size:.8rem;}
    .hd-title{font-size:.7rem;color:var(--tx2);font-weight:600;white-space:nowrap;}
    .hd-chip{
      background:var(--acc);color:#fff;
      font-size:.58rem;font-weight:600;
      padding:.1rem .42rem;border-radius:20px;white-space:nowrap;
    }
    .hd-right{display:flex;align-items:center;gap:.5rem;flex-shrink:0;}
    .hd-time{text-align:right;}
    .hd-clock{font-size:.66rem;font-weight:600;color:var(--tx2);font-variant-numeric:tabular-nums;letter-spacing:.04em;}
    .hd-elapsed-row{display:flex;align-items:center;gap:.2rem;justify-content:flex-end;}
    .hd-elapsed-lbl{font-size:.55rem;color:var(--tx3);}
    .hd-elapsed{font-size:.66rem;font-weight:700;color:var(--acc);font-variant-numeric:tabular-nums;}
    .btn-leave{
      font-size:.67rem;padding:.26rem .62rem;
      background:none;color:var(--tx2);
      border:1px solid var(--border2);border-radius:var(--rs);
      cursor:pointer;font-family:var(--ff);white-space:nowrap;
      transition:background .15s,color .15s;
    }
    .btn-leave:hover{background:var(--border);color:var(--tx1);}

    /* ── 메인 ── */
    .main{
      flex:1;display:flex;flex-direction:column;
      align-items:center;padding:1rem .8rem 2rem;gap:.7rem;
    }

    /* ── 테이블 영역 헤더 ── */
    .tbl-hdr{
      display:flex;align-items:center;justify-content:space-between;
      width:min(580px,96vw);
      margin-bottom:.45rem;padding:0 .15rem;
    }
    .tbl-lbl{
      font-size:.58rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;
      color:var(--tx3);
    }
    .tbl-note{font-size:.57rem;color:var(--tx3);}

    /* ── 그리드 래퍼 (외곽 테두리 + 라운드) ── */
    .grid-wrap{
      width:min(580px,96vw);
      border:1.5px solid var(--gl);
      border-radius:11px;
      overflow:hidden;
    }

    /* ── CSS grid: gap = 그리드 선 ── */
    .lib-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(74px,1fr));
      gap:1.5px;
      background:var(--gl);
    }

    /* ── 일반 좌석 ── */
    .seat{
      background:var(--card);
      display:flex;flex-direction:column;align-items:center;gap:.18rem;
      padding:.44rem .3rem .38rem;
      min-height:72px;cursor:default;
      position:relative;
      animation:seatIn .18s ease;
      transition:background .1s;
    }
    .seat:hover{background:#fdf0e0;}
    @keyframes seatIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}

    /* ── '나' 뱃지 ── */
    .seat.is-me{background:#fef5e9;}
    .me-badge{
      position:absolute;top:4px;right:5px;
      font-size:.45rem;font-weight:700;
      background:var(--acc);color:#fff;
      padding:.06rem .24rem;border-radius:8px;
      line-height:1.5;
    }

    /* ── 이름 ── */
    .name{
      font-size:.56rem;color:var(--tx2);font-weight:600;
      max-width:68px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      text-align:center;
    }

    /* ── 말풍선 (일반) ── */
    .speech{
      position:relative;
      background:#fdf7ee;border:1px solid var(--border);border-radius:7px;
      padding:.16rem .34rem;
      font-size:.52rem;color:var(--tx2);
      max-width:72px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      line-height:1.3;text-align:center;
    }
    .speech::before{
      content:'';position:absolute;
      top:-5px;left:50%;transform:translateX(-50%);
      border-left:4px solid transparent;border-right:4px solid transparent;
      border-bottom:5px solid var(--border);
    }
    .speech::after{
      content:'';position:absolute;
      top:-3.5px;left:50%;transform:translateX(-50%);
      border-left:3.5px solid transparent;border-right:3.5px solid transparent;
      border-bottom:4.5px solid #fdf7ee;
    }
    .speech-tip{
      display:none;position:absolute;
      bottom:calc(100% + 7px);left:50%;transform:translateX(-50%);
      background:var(--tx1);color:#fff;
      font-size:.58rem;padding:.24rem .5rem;border-radius:6px;
      white-space:nowrap;z-index:100;
      max-width:150px;white-space:normal;text-align:center;line-height:1.4;
      pointer-events:none;
    }
    .seat:hover .speech-tip{display:block;}

    /* ── 유령 좌석 ── */
    .ghost{
      background:linear-gradient(135deg,#f6f1ea,#ede4d3);
      display:flex;flex-direction:column;align-items:center;gap:.18rem;
      padding:.44rem .3rem .38rem;
      min-height:72px;cursor:default;
      position:relative;
      animation:seatIn .18s ease;
      transition:background .1s;
    }
    .ghost:hover{background:linear-gradient(135deg,#f0ebe0,#e7dcca);}
    .ghost-emoji{font-size:1.45rem;line-height:1;filter:opacity(.78);}

    /* ── 생각 말풍선 (유령) ── */
    .thought{
      position:relative;
      background:#fdf9f3;border:1px solid var(--border);border-radius:12px;
      padding:.15rem .34rem;
      font-size:.52rem;color:var(--tx3);font-style:italic;
      max-width:72px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      line-height:1.3;text-align:center;
    }
    .thought::before{
      content:'';position:absolute;
      bottom:-6px;left:calc(50% - 3px);
      width:5px;height:5px;
      background:#fdf9f3;border:1px solid var(--border);border-radius:50%;
    }
    .thought::after{
      content:'';position:absolute;
      bottom:-11px;left:calc(50% - 2px);
      width:3.5px;height:3.5px;
      background:#fdf9f3;border:1px solid var(--border);border-radius:50%;
    }

    /* ── 유령 툴팁 ── */
    .ghost-tip{
      display:none;position:absolute;
      top:-32px;left:50%;transform:translateX(-50%);
      background:rgba(46,31,14,.88);color:#fff;
      font-size:.56rem;padding:.22rem .46rem;border-radius:5px;
      white-space:nowrap;z-index:100;pointer-events:none;font-style:normal;
    }
    .ghost:hover .ghost-tip{display:block;}

    /* ── 빈 슬롯 ── */
    .slot-empty{
      background:#f7f2e8;
      min-height:72px;
    }

    /* ── 빈 상태 ── */
    .lib-empty{
      text-align:center;padding:1.1rem .8rem .5rem;
      color:var(--tx3);font-size:.68rem;line-height:1.75;
    }

    /* ── 로딩 ── */
    .loading{
      text-align:center;padding:3rem;color:var(--tx3);font-size:.78rem;
    }
    .spinner{
      width:20px;height:20px;
      border:2px solid var(--border);border-top-color:var(--acc);
      border-radius:50%;animation:spin .8s linear infinite;
      margin:0 auto .75rem;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    .status-msg{
      font-size:.68rem;color:var(--tx3);text-align:center;
      padding:.5rem 1rem;line-height:1.65;
    }

    @media(max-width:360px){
      .lib-grid{grid-template-columns:repeat(auto-fill,minmax(64px,1fr));}
      .seat,.ghost{padding:.38rem .24rem .3rem;min-height:64px;}
    }
  </style>
</head>
<body>

<!-- 헤더 -->
<div class="hd">
  <div class="hd-left">
    <span class="hd-logo">Booklog</span>
    <span class="hd-sep">·</span>
    <span class="hd-title">도서관</span>
    <span class="hd-chip" id="lib-count">0명</span>
  </div>
  <div class="hd-right">
    <div class="hd-time">
      <div class="hd-clock" id="lib-clock">00:00:00</div>
      <div class="hd-elapsed-row">
        <span class="hd-elapsed-lbl">체류</span>
        <span class="hd-elapsed" id="lib-elapsed">0s</span>
      </div>
    </div>
    <button class="btn-leave" onclick="leaveLibrary()">나가기</button>
  </div>
</div>

<!-- 메인 -->
<div class="main">
  <div id="lib-area" style="width:min(580px,96vw);">
    <div class="loading"><div class="spinner"></div>입장 중...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://xowlwzpoxrudgaoavkbr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhvd2x3enBveHJ1ZGdhb2F2a2JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NTgxNjQsImV4cCI6MjA5MjIzNDE2NH0.Dlv8KYcQAieS1jQ9J6zjfsodco2U-m3ObuP5LXJPaVQ';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { persistSession:true, storageKey:'booklog-auth', storage:window.localStorage, autoRefreshToken:true }
});

let params={}, channel=null, joinedAt=null, clockTick=null, myUserId=null, selfPresence=null;

/* ── 시계 ── */
function startClock() {
  function tick() {
    const n=new Date(), pad=v=>String(v).padStart(2,'0');
    const cl=document.getElementById('lib-clock');
    if(cl) cl.textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
    const el=document.getElementById('lib-elapsed');
    if(el && joinedAt) {
      const s=Math.floor((Date.now()-joinedAt)/1000);
      const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;
      el.textContent=h>0?`${h}h ${m}m`:m>0?`${m}m ${sc}s`:`${sc}s`;
    }
  }
  tick();
  clockTick=setInterval(tick,1000);
}

/* ── 아바타 ── */
function makeAv(name,url,size) {
  const init=(name||'독').slice(0,1).toUpperCase();
  const cols=['#b07030','#6b8f6b','#5a7a8a','#8b6b8b','#c4714a'];
  const bg=cols[(name||'').charCodeAt(0)%cols.length];
  const fb=`<div style="width:${size}px;height:${size}px;border-radius:50%;background:${bg};border:1.5px solid #ddd0b8;display:flex;align-items:center;justify-content:center;font-size:${Math.round(size*.38)}px;font-weight:600;color:#fff;flex-shrink:0;">${init}</div>`;
  if(url) return `<img src="${url.replace(/'/g,'%27')}" style="width:${size}px;height:${size}px;border-radius:50%;border:1.5px solid #ddd0b8;object-fit:cover;flex-shrink:0;" onerror="this.outerHTML='${fb.replace(/'/g,'&#39;')}'">`;
  return fb;
}

/* ── HTML 이스케이프 ── */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ── 좌석 카드 ── */
function makeSeat(m) {
  if(m.is_observer) return '';

  if(m.is_ghost) {
    const tip=m._isMe?'<div class="ghost-tip">나 (유령 모드)</div>':'<div class="ghost-tip">유령이 함께 읽고 있어요!</div>';
    const book=m.book_title?`<div class="thought" title="${esc(m.book_title)}">📖 ${esc(m.book_title.length>10?m.book_title.slice(0,10)+'…':m.book_title)}</div>`:'';
    return `<div class="ghost">${tip}<div class="ghost-emoji">👻</div>${book}</div>`;
  }

  const name=m.display_name||'독자';
  const av=makeAv(name,m.avatar_url,38);
  let speech='';
  if(m.book_title){
    const sh=m.book_title.length>10?m.book_title.slice(0,10)+'…':m.book_title;
    speech=`<div class="speech">📖 ${esc(sh)}<div class="speech-tip">${esc(m.book_title)}</div></div>`;
  }
  const meBadge=m._isMe?'<span class="me-badge">나</span>':'';
  const meCls=m._isMe?' is-me':'';
  return `<div class="seat${meCls}">${meBadge}${av}<div class="name">${esc(name)}</div>${speech}</div>`;
}

/* ── 렌더링 ── */
function render() {
  const area=document.getElementById('lib-area');
  if(!area) return;

  const state=channel?channel.presenceState():{};
  const myServerEntries=myUserId?(state[myUserId]||[]):[];
  const serverMembers=Object.values(state).flat().filter(m=>!m.is_observer);

  // 내 presence_ref 찾아 _isMe 마킹
  const myRefs=new Set(myServerEntries.map(e=>e.presence_ref));
  serverMembers.forEach(m=>{ m._isMe=myRefs.has(m.presence_ref); });

  // 서버에 아직 안 잡힐 때 로컬 데이터로 자신 표시
  let members;
  if(myServerEntries.length===0 && selfPresence) {
    members=[{...selfPresence, _isMe:true}, ...serverMembers];
  } else {
    members=serverMembers;
  }

  const cnt=document.getElementById('lib-count');
  if(cnt) cnt.textContent=`${members.length}명`;

  const minSlots=Math.max(members.length+2,6);
  const emptySlots=Math.max(0,minSlots-members.length);
  const seatHtml=members.map(makeSeat).join('');
  const emptyHtml=Array.from({length:emptySlots}).map(()=>`<div class="slot-empty"></div>`).join('');
  const emptyMsg=members.length===0
    ?`<div class="lib-empty">🕯️<br>아직 아무도 없어요.<br>오늘의 첫 번째 독자가 되어보세요.</div>`
    :'';

  area.innerHTML=`
    <div class="tbl-hdr">
      <span class="tbl-lbl">Reading Table</span>
    </div>
    <div class="grid-wrap">
      <div class="lib-grid">${seatHtml}${emptyHtml}</div>
    </div>
    ${emptyMsg}`;
}

/* ── 나가기 ── */
async function leaveLibrary() {
  saveTime();
  clearInterval(clockTick);
  if(channel) {
    try{await channel.untrack();}catch(e){}
    try{await channel.unsubscribe();}catch(e){}
    channel=null;
  }
  try{window.close();}catch(e){}
  setTimeout(()=>{
    const a=document.getElementById('lib-area');
    if(a) a.innerHTML='<div class="status-msg">독서 시간이 저장됐어요 👋<br>이 창을 닫아주세요.</div>';
  },300);
}

/* ── 시간 저장 ── */
function saveTime() {
  if(!joinedAt||!params.bookId) return;
  const mins=Math.round((Date.now()-joinedAt)/60000);
  if(mins<1) return;
  localStorage.setItem('bl_lib_session_done',JSON.stringify({
    bookId:params.bookId, minutes:mins, date:new Date().toISOString().slice(0,10)
  }));
}

/* ── 초기화 ── */
async function init() {
  startClock();
  try {
    const raw=localStorage.getItem('bl_lib_params');
    if(raw){params=JSON.parse(raw);localStorage.removeItem('bl_lib_params');}
  } catch(e){params={};}

  let session=null;
  try {
    const {data}=await Promise.race([
      sb.auth.getSession(),
      new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),5000))
    ]);
    session=data?.session;
  } catch(e){}

  if(!session?.user) {
    document.getElementById('lib-area').innerHTML='<div class="status-msg">🔒 로그인이 필요해요.<br>북로그에서 로그인 후 다시 시도해주세요.</div>';
    return;
  }

  joinedAt=Date.now();
  myUserId=session.user.id;

  // 내 presence 정보 로컬 저장 (서버 응답 전 폴백 렌더용)
  selfPresence=params.isGhost
    ?{is_ghost:true, is_observer:false, book_title:params.bookTitle||null}
    :{is_ghost:false, is_observer:false,
      display_name:params.displayName||'독자',
      avatar_url:params.avatarUrl||null,
      book_title:params.bookTitle||null};

  channel=sb.channel('bl_library',{config:{presence:{key:myUserId}}});

  channel
    .on('presence',{event:'sync'},()=>render())
    .on('presence',{event:'join'},()=>render())
    .on('presence',{event:'leave'},()=>render())
    .subscribe(async status=>{
      if(status==='SUBSCRIBED'){
        document.querySelector('.loading')?.remove();
        render(); // selfPresence 폴백으로 즉시 렌더
        try{await channel.track(selfPresence);}catch(e){}
        // 서버 반영 후 재렌더 (sync 이벤트가 처리하지만 보험용)
        setTimeout(()=>render(),600);
      } else if(status==='CHANNEL_ERROR'||status==='TIMED_OUT'){
        document.getElementById('lib-area').innerHTML='<div class="status-msg">📡 연결에 실패했어요.<br>잠시 후 다시 시도해주세요.</div>';
      }
    });
}

window.addEventListener('beforeunload',()=>saveTime());
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
